<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RX Staff — Доставка</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #000; color: #fff; }
        .slide-up { animation: slideUp 0.5s ease-out forwards; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .hidden { display: none !important; }
        .glass-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="p-6">

    <div id="auth-section" class="flex flex-col items-center justify-center min-h-[80vh] slide-up">
        <div class="w-20 h-20 bg-zinc-900 rounded-3xl mb-6 flex items-center justify-center text-4xl shadow-2xl">📦</div>
        <h1 class="text-3xl font-black italic mb-12 uppercase tracking-tighter">RX Staff</h1>
        <button onclick="login()" class="bg-white text-black px-12 py-5 rounded-2xl font-black uppercase text-[10px] tracking-widest">Войти в смену</button>
    </div>

    <div id="wait-section" class="hidden flex flex-col items-center justify-center min-h-[80vh] text-center slide-up">
        <div class="text-6xl mb-6">🔒</div>
        <h2 class="text-xl font-black uppercase mb-4 text-orange-500">Доступ закрыт</h2>
        <p class="text-sm opacity-50 mb-8 max-w-xs">Твой аккаунт должен подтвердить Богдан. Позвони ему или напиши.</p>
        <a href="tel:+79000000000" class="border border-white/20 px-8 py-4 rounded-xl text-[10px] font-black uppercase tracking-widest">Связаться</a>
    </div>

    <div id="main-section" class="hidden slide-up">
        <header class="flex justify-between items-center mb-10">
            <div>
                <h2 id="courier-name" class="text-xl font-black italic uppercase">Курьер</h2>
                <div class="flex items-center gap-2">
                    <div class="w-1.5 h-1.5 bg-green-500 rounded-full"></div>
                    <p class="text-[9px] font-black opacity-30 uppercase tracking-widest">На линии</p>
                </div>
            </div>
            <img id="user-avatar" src="" class="w-12 h-12 rounded-xl border border-white/10">
        </header>

        <div id="staff-orders" class="space-y-4">
            </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBD8BzKaEBxcD-e24ypRh1qZ-iCvZZY6nQ",
            authDomain: "deliverygov11.firebaseapp.com",
            databaseURL: "https://deliverygov11-default-rtdb.firebaseio.com",
            projectId: "deliverygov11",
            storageBucket: "deliverygov11.firebasestorage.app",
            messagingSenderId: "562994407235",
            appId: "1:562994407235:web:dde4e7438511fa1bc871f6",
            measurementId: "G-0KDKG67YQL"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        auth.onAuthStateChanged((user) => {
            if (user) {
                document.getElementById('auth-section').classList.add('hidden');
                checkAccess(user);
            }
        });

        function login() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }

        function checkAccess(user) {
            db.collection("staff").doc(user.uid).onSnapshot((doc) => {
                if (doc.exists && doc.data().isApproved) {
                    document.getElementById('wait-section').classList.add('hidden');
                    document.getElementById('main-section').classList.remove('hidden');
                    document.getElementById('courier-name').innerText = user.displayName;
                    document.getElementById('user-avatar').src = user.photoURL;
                    loadOrders();
                } else {
                    document.getElementById('wait-section').classList.remove('hidden');
                    if (!doc.exists) {
                        db.collection("staff").doc(user.uid).set({ name: user.displayName, email: user.email, isApproved: false });
                    }
                }
            });
        }

        function loadOrders() {
            db.collection("orders").where("status", "==", "new").onSnapshot(snap => {
                let html = "";
                snap.forEach(doc => {
                    const o = doc.data();
                    html += `
                        <div class="glass-card p-6 rounded-[30px] slide-up">
                            <p class="text-orange-500 font-black mb-1">${o.price} ₽</p>
                            <h3 class="text-lg font-black uppercase mb-4">${o.items || o.item}</h3>
                            <p class="text-[10px] opacity-40 uppercase mb-6">📍 ${o.address}</p>
                            <button onclick="alert('Заказ взят!')" class="w-full py-4 bg-white text-black rounded-xl font-black text-[10px] uppercase tracking-widest">Взять заказ</button>
                        </div>
                    `;
                });
                document.getElementById('staff-orders').innerHTML = html || "<p class='text-center opacity-20 italic py-10'>Пока нет заказов</p>";
            });
        }
    </script>
</body>
</html>

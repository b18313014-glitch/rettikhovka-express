<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RX - Выбор входа</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        :root { --bg: #ffffff; --text: #000000; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); transition: 0.3s; overflow: hidden; }
        
        .login-btn { @apply w-full py-4 rounded-2xl font-bold text-sm flex items-center justify-center gap-3 mb-3 border transition-all active:scale-95; }
        
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }
        .error-shake { animation: shake 0.4s ease-in-out; border-color: #ff4b4b !important; }

        @keyframes digit-bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); color: #22c55e; } }
        .success-bounce { animation: digit-bounce 0.6s ease-in-out; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="screen-login-choice" class="flex flex-col items-center justify-center min-h-screen p-8">
        <div class="text-center mb-12">
            <h1 class="text-6xl font-black italic tracking-tighter">RX</h1>
            <p class="text-[10px] uppercase tracking-[0.4em] mt-2 opacity-40">Реттиховка Экспресс</p>
        </div>

        <div class="w-full max-w-xs">
            <button onclick="startAuth('google')" class="login-btn bg-white border-zinc-200">
                <img src="https://www.google.com/favicon.ico" class="w-4 h-4"> Войти через Google
            </button>
            <button onclick="startAuth('apple')" class="login-btn bg-black text-white border-black">
                <span class="text-lg"></span> Войти через Apple
            </button>
            <button onclick="startAuth('yandex')" class="login-btn bg-[#ff0000] text-white border-[#ff0000]">
                <span class="font-black">Я</span> Войти через Яндекс
            </button>
            <div class="flex items-center my-6 opacity-20"><hr class="flex-grow"> <span class="px-3 text-xs">ИЛИ</span> <hr class="flex-grow"></div>
            <button onclick="showPhoneInput()" class="login-btn bg-zinc-100 border-transparent text-black">
                📱 По номеру телефона
            </button>
        </div>
    </div>

    <div id="screen-sms" class="hidden flex flex-col items-center justify-center min-h-screen p-8 text-center">
        <button onclick="backToChoice()" class="absolute top-10 left-8 text-sm font-bold opacity-40">← Назад</button>
        
        <h2 id="sms-title" class="text-2xl font-black mb-2">ВАШ ТЕЛЕФОН</h2>
        <p id="sms-subtitle" class="text-xs opacity-50 mb-8">Введите номер для получения кода</p>

        <div class="w-full max-w-xs">
            <input id="auth-input" type="text" placeholder="+7 (___) ___-__-__" 
                   class="w-full bg-zinc-50 p-5 rounded-[25px] text-center text-xl font-bold outline-none border-2 border-transparent transition-all">
            
            <button id="auth-confirm-btn" onclick="handleAuthNext()" class="mt-8 bg-black text-white w-full py-5 rounded-full font-black uppercase text-[10px] tracking-widest active:scale-95 transition-all">
                Получить код
            </button>
        </div>
    </div>

    <div id="screen-prefs" class="hidden fixed inset-0 z-50 bg-white p-8 flex flex-col justify-center">
        <h2 class="text-4xl font-black mb-2">ЧТО ВЫ<br>ЛЮБИТЕ?</h2>
        <p class="opacity-40 text-sm mb-10 italic">Мы настроим ленту под вас</p>
        <div class="grid grid-cols-2 gap-3">
            <button onclick="this.classList.toggle('bg-black'); this.classList.toggle('text-white')" class="p-6 border-2 border-zinc-100 rounded-[30px] font-bold text-sm">🍕 Пицца</button>
            <button onclick="this.classList.toggle('bg-black'); this.classList.toggle('text-white')" class="p-6 border-2 border-zinc-100 rounded-[30px] font-bold text-sm">🍔 Бургеры</button>
            <button onclick="this.classList.toggle('bg-black'); this.classList.toggle('text-white')" class="p-6 border-2 border-zinc-100 rounded-[30px] font-bold text-sm">🥤 Напитки</button>
            <button onclick="this.classList.toggle('bg-black'); this.classList.toggle('text-white')" class="p-6 border-2 border-zinc-100 rounded-[30px] font-bold text-sm">🧁 Десерты</button>
        </div>
        <button onclick="location.reload()" class="mt-12 bg-black text-white py-5 rounded-3xl font-black uppercase text-[10px]">Зайти в приложение</button>
    </div>

    <script>
        let step = 'phone'; // phone или sms

        function showPhoneInput() {
            document.getElementById('screen-login-choice').classList.add('hidden');
            document.getElementById('screen-sms').classList.remove('hidden');
        }

        function backToChoice() {
            document.getElementById('screen-sms').classList.add('hidden');
            document.getElementById('screen-login-choice').classList.remove('hidden');
            resetAuth();
        }

        function handleAuthNext() {
            const input = document.getElementById('auth-input');
            const title = document.getElementById('sms-title');
            const btn = document.getElementById('auth-confirm-btn');

            if (step === 'phone') {
                if (input.value.length < 5) {
                    input.classList.add('error-shake');
                    setTimeout(() => input.classList.remove('error-shake'), 400);
                    return;
                }
                // Переход к SMS
                step = 'sms';
                title.innerText = "ВВЕДИТЕ КОД";
                input.value = "";
                input.placeholder = "0000";
                input.style.letterSpacing = "0.5em";
                input.style.fontSize = "2rem";
                btn.innerText = "Проверить код";
            } else {
                // Проверка кода (наш тестовый 1234)
                if (input.value === "1234") {
                    input.classList.add('success-bounce');
                    setTimeout(() => {
                        document.getElementById('screen-sms').classList.add('hidden');
                        document.getElementById('screen-prefs').classList.remove('hidden');
                    }, 800);
                } else {
                    input.classList.add('error-shake');
                    setTimeout(() => input.classList.remove('error-shake'), 400);
                }
            }
        }

        function startAuth(service) {
            alert("Запуск входа через " + service + ". В реальности здесь откроется окно Google/Apple.");
            // После логина сразу ведем в предпочтения
            document.getElementById('screen-login-choice').classList.add('hidden');
            document.getElementById('screen-prefs').classList.remove('hidden');
        }

        function resetAuth() {
            step = 'phone';
            const input = document.getElementById('auth-input');
            input.placeholder = "+7 (___) ___-__-__";
            input.style.letterSpacing = "normal";
            input.style.fontSize = "1.25rem";
            document.getElementById('sms-title').innerText = "ВАШ ТЕЛЕФОН";
            document.getElementById('auth-confirm-btn').innerText = "Получить код";
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RX-EXPRESS | Реттиховка</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.1.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.0/firebase-auth-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">

    <style>
        :root { --blue: #005bff; --bg: #0f0f12; --card: #1c1c21; --text: #ffffff; --accent: #ffcc00; }
        body { background: var(--bg); font-family: 'Montserrat', sans-serif; margin: 0; color: var(--text); transition: 0.3s; }
        
        /* Внутренние уведомления (Вместо алертов) */
        #toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-100px); background: var(--card); border: 2px solid var(--blue); padding: 15px 25px; border-radius: 20px; z-index: 11000; transition: 0.5s; font-weight: 700; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        #toast.active { transform: translateX(-50%) translateY(0); }

        /* Экраны */
        .screen { display: none; min-height: 100vh; padding: 20px; box-sizing: border-box; animation: fadeIn 0.4s ease; }
        .screen.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Регистрация (Стильный темный вид) */
        #scr-auth { background: linear-gradient(180deg, #000 0%, var(--bg) 100%); flex-direction: column; align-items: center; justify-content: center; display: none; }
        .auth-box { width: 100%; max-width: 350px; text-align: center; }

        /* Элементы */
        .btn { width: 100%; padding: 20px; border-radius: 24px; border: none; font-weight: 900; font-size: 16px; cursor: pointer; transition: 0.2s; margin-top: 15px; text-transform: uppercase; }
        .btn-blue { background: var(--blue); color: white; }
        .btn-white { background: white; color: black; }
        input { width: 100%; padding: 20px; border-radius: 20px; border: 1px solid #333; background: #25252b; color: white; margin: 10px 0; box-sizing: border-box; font-family: inherit; }

        /* Яндекс.Go Стиль */
        .header { display: flex; justify-content: space-between; padding: 10px 0; align-items: center; }
        .icon-btn { background: var(--card); width: 50px; height: 50px; border-radius: 18px; display: flex; align-items: center; justify-content: center; font-size: 24px; }
        .main-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .go-card { background: var(--card); padding: 20px; border-radius: 30px; height: 160px; position: relative; display: flex; flex-direction: column; justify-content: flex-start; }
        .ozon-card { background: var(--blue); }

        /* Слайдер обучения */
        #onboarding { position: fixed; inset: 0; background: #000; z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px; text-align: center; }
        .step { display: none; }
        .step.active { display: block; }
    </style>
</head>
<body>

<div id="toast">Сообщение</div>

<div id="onboarding">
    <div class="step active" id="st1"><h1>RX EXPRESS</h1><p>Доставка в Реттиховке</p></div>
    <div class="step" id="st2"><h1>OZON</h1><p>Загрузи QR до 3МБ и жди курьера</p></div>
    <div class="step" id="st3"><h1>РЕЙТИНГ</h1><p>Закажи больше - плати за доставку 0₽</p></div>
    <div style="display:flex; gap:10px; margin-top:30px;">
        <button class="btn btn-white" id="bBack" style="display:none;" onclick="move(-1)">Назад</button>
        <button class="btn btn-blue" id="bNext" onclick="move(1)">Вперёд</button>
    </div>
</div>

<div id="scr-auth" class="screen">
    <div class="auth-box">
        <h2 style="font-size:35px;">ВХОД</h2>
        <input type="email" id="inEmail" placeholder="Почта">
        <input type="password" id="inPass" placeholder="Пароль">
        <button class="btn btn-blue" onclick="emailLogin()">ВОЙТИ</button>
        <button class="btn btn-white" onclick="googleLogin()">GOOGLE LOGIN</button>
    </div>
</div>

<div id="scr-home" class="screen">
    <div class="header">
        <div style="font-weight:900; font-size:24px;">📍 РЕТТИХОВКА</div>
        <div style="display:flex; gap:10px;">
            <div class="icon-btn" onclick="showScreen('cart')">🛒</div>
            <div class="icon-btn" onclick="showScreen('profile')">👤</div>
        </div>
    </div>
    <div class="main-grid">
        <div class="go-card" onclick="showMsg('Выбирай магазин в Firebase!')">
            <h3>ЕДА</h3>
            <span style="opacity:0.5;">Магазины</span>
        </div>
        <div class="go-card ozon-card" onclick="ozonUpload()">
            <h3>OZON</h3>
            <span style="opacity:0.8;">Загрузить QR</span>
        </div>
    </div>
</div>

<div id="scr-profile" class="screen">
    <div class="header">
        <div class="icon-btn" onclick="showScreen('home')">←</div>
        <div style="font-weight:900;">МОЙ АККАУНТ</div>
    </div>
    <div style="background:var(--card); padding:20px; border-radius:25px; margin-top:20px;">
        <p id="pEmail">Email: ...</p>
        <p id="pRating">Рейтинг: 0</p>
    </div>
    <button class="btn btn-blue" onclick="window.location.href='tel:+79140000000'">СВЯЗАТЬСЯ С ПОДДЕРЖКОЙ</button>
</div>

<script>
    // CONFIG
    const firebaseConfig = {
        apiKey: "AIzaSyBD8BzKaEBxcD-e24ypRh1qZ-iCvZZY6nQ",
        authDomain: "deliverygov11.firebaseapp.com",
        projectId: "deliverygov11",
        storageBucket: "deliverygov11.firebasestorage.app",
        messagingSenderId: "562994407235",
        appId: "1:562994407235:web:27765b2d4916e82ec871f6"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();
    const DBX_TOKEN = "sl.u.AGdcbHvrpxpjxCndaUZYDVX-WF-GLXYDT5c7gTXb6vBkm6lHnU8n6V5l8sOiINQXI";

    // UI LOGIC
    function showMsg(text) {
        const t = document.getElementById('toast');
        t.innerText = text;
        t.classList.add('active');
        setTimeout(() => t.classList.remove('active'), 3000);
    }

    let curS = 1;
    function move(d) {
        document.getElementById('st'+curS).classList.remove('active');
        curS += d;
        if(curS > 3) { document.getElementById('onboarding').style.display='none'; showScreen('auth'); }
        else {
            document.getElementById('st'+curS).classList.add('active');
            document.getElementById('bBack').style.display = curS === 1 ? 'none' : 'block';
            document.getElementById('bNext').innerText = curS === 3 ? 'ГОТОВО' : 'Далее';
        }
    }

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('scr-'+id).style.display = 'flex';
        document.getElementById('scr-'+id).classList.add('active');
    }

    // OZON DROPBOX
    async function ozonUpload() {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = 'image/*';
        input.onchange = async (e) => {
            const file = e.target.files[0];
            if(file.size > 3*1024*1024) return showMsg("ФАЙЛ СЛИШКОМ БОЛЬШОЙ!");
            
            showMsg("ЗАГРУЗКА...");
            const res = await fetch('https://content.dropboxapi.com/2/files/upload', {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${DBX_TOKEN}`,
                    'Content-Type': 'application/octet-stream',
                    'Dropbox-API-Arg': JSON.stringify({ path: `/orders/${Date.now()}_${file.name}`, mode: 'add' })
                },
                body: file
            });
            if(res.ok) showMsg("QR-КОД ПРИНЯТ! КУРЬЕР СКОРО БУДЕТ.");
            else showMsg("ОШИБКА DROPBOX!");
        };
        input.click();
    }

    // AUTH
    async function googleLogin() {
        const p = new firebase.auth.GoogleAuthProvider();
        const r = await auth.signInWithPopup(p);
        showScreen('home');
        document.getElementById('pEmail').innerText = "Email: " + r.user.email;
    }
</script>
</body>
</html>

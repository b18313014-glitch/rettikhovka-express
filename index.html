<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RX HUB - Billing System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --main: #ffcc00; --dark: #1a1a1a; --gray: #f4f4f4; --ozon: #005bff; }
        * { box-sizing: border-box; font-family: 'Ubuntu', sans-serif; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body { background: #000; display: flex; justify-content: center; min-height: 100vh; overflow-x: hidden; }

        #app { 
            width: 100%; max-width: 500px; background: var(--gray); 
            position: relative; min-height: 100vh; display: flex; flex-direction: column;
            box-shadow: 0 0 40px rgba(0,0,0,0.6);
        }
        @media (min-width: 800px) { #app { max-width: 600px; } }

        .page { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: var(--gray); z-index: 100; display: none; flex-direction: column; 
        }
        .page.active { display: flex; animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }

        header { background: #fff; padding: 18px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; }
        
        .btn-action { width: 100%; padding: 16px; border: none; border-radius: 14px; font-weight: bold; cursor: pointer; font-size: 15px; transition: 0.2s; }
        .btn-action:active { transform: scale(0.98); }

        /* Окно СБП Кода */
        #sbp-modal { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.9); z-index: 50000; 
            display: none; flex-direction: column; align-items: center; justify-content: center; 
            padding: 30px; color: #fff; text-align: center; 
        }
        .order-id-box { 
            background: #fff; color: #000; padding: 20px; border-radius: 15px; 
            font-size: 32px; font-weight: 900; letter-spacing: 2px; margin: 20px 0;
            border: 4px dashed var(--main);
        }
    </style>
</head>
<body>

<div id="app">
    <header>
        <b style="font-size: 20px;">RX HUB</b>
        <div style="display:flex; gap:18px; font-size: 20px;"><i class="fa-solid fa-cart-shopping" onclick="openPage('cart-page')"></i></div>
    </header>

    <div style="padding: 15px;">
        <div style="background:#fff; padding:15px; border-radius:18px; margin-bottom:15px; border-left:6px solid var(--main);">
            <small style="color:#888">Статус:</small><br><b id="widget-status">Ожидание заказа</b>
        </div>
        <button class="btn-action" style="background:var(--main);" onclick="openPage('cart-page')">ОФОРМИТЬ ТЕСТОВЫЙ ЗАКАЗ</button>
    </div>

    <div id="cart-page" class="page">
        <header><i class="fa-solid fa-chevron-left" onclick="closePage('cart-page')"></i><b>ОПЛАТА</b><div></div></header>
        <div style="padding:20px;">
            <h3>К оплате: 540 ₽</h3>
            <p style="margin: 10px 0; color: #666;">Выберите способ оплаты:</p>
            <button class="btn-action" style="background:#000; color:#fff; margin-bottom: 10px;" onclick="showSbpInfo()">СБП (ПЕРЕВОД)</button>
            <button class="btn-action" style="background:#ddd;">НАЛИЧНЫЕ</button>
        </div>
    </div>

    <div id="sbp-modal">
        <i class="fa-solid fa-circle-info fa-3x" style="color:var(--main)"></i>
        <h2 style="margin-top:20px;">ЗАПОМНИТЕ КОД!</h2>
        <p style="margin-top:10px; opacity: 0.8;">Введите этот код в поле <b>"Сообщение получателю"</b> при переводе в банке. Это обязательно для подтверждения заказа!</p>
        
        <div class="order-id-box" id="display-order-id">RX-777</div>
        
        <button class="btn-action" style="background:var(--main); color:#000;" onclick="copyAndPay()">КОПИРОВАТЬ И ПЕРЕЙТИ В БАНК</button>
        <button onclick="document.getElementById('sbp-modal').style.display='none'" style="background:none; color:#aaa; border:none; margin-top:20px; cursor:pointer;">Отмена</button>
    </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBD8BzKaEBxcD-e24ypRh1qZ-iCvZZY6nQ",
    authDomain: "deliverygov11.firebaseapp.com",
    databaseURL: "https://deliverygov11-default-rtdb.firebaseio.com",
    projectId: "deliverygov11",
    storageBucket: "deliverygov11.firebasestorage.app",
    messagingSenderId: "562994407235",
    appId: "1:562994407235:web:27765b2d4916e82ec871f6"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  // Генерация ID
  window.showSbpInfo = () => {
    const orderId = "RX-" + Math.floor(1000 + Math.random() * 9000);
    document.getElementById('display-order-id').innerText = orderId;
    document.getElementById('sbp-modal').style.display = 'flex';
    
    // Сразу записываем в базу, что мы ждем оплату по этому коду
    set(ref(db, 'orders/' + orderId), {
        status: "waiting_payment",
        amount: 540,
        time: new Date().toISOString()
    });
  };

  window.copyAndPay = () => {
    const code = document.getElementById('display-order-id').innerText;
    navigator.clipboard.writeText(code).then(() => {
        alert("Код скопирован! Вставьте его в сообщение в банке.");
        // Ссылка на СБП (твоя)
        window.location.href = "https://c2c.cbrpay.ru/AS1I003EI3T7RIPG9018PF66SR2FTN0V";
    });
  };
</script>

<script>
    function openPage(id) { document.getElementById(id).classList.add('active'); }
    function closePage(id) { document.getElementById(id).classList.remove('active'); }
</script>

</body>
</html>

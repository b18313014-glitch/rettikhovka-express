<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RX Delivery - Корпорация</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --main: #ffcc00; --dark: #1a1a1a; --gray: #f4f4f4; --red: #ff4444; }
        
        /* ЭФФЕКТ ЛИНЗЫ (РЫБИЙ ГЛАЗ) ДЛЯ ВСЕГО ТЕЛА */
        html {
            background: #000; /* Фон за пределами "телефона" */
            display: flex;
            justify-content: center;
        }

        body { 
            font-family: 'Ubuntu', sans-serif; 
            margin: 0; 
            background: var(--gray); 
            color: var(--dark); 
            overflow-x: hidden;
            /* ОГРАНИЧЕНИЕ ПОД СТАНДАРТНЫЙ ТЕЛЕФОН */
            width: 100%;
            max-width: 450px; /* Размер типичного Xiaomi/Samsung */
            min-height: 100vh;
            position: relative;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
            /* ЭФФЕКТ ВЫПУКЛОСТИ */
            transform: perspective(1000px) rotateX(0deg);
        }

        /* Тот самый эффект "Рыбий глаз" через искажение контейнера */
        .fisheye-layer {
            width: 100%;
            height: 100%;
            transition: 0.3s;
            /* Слегка закругляем края для эффекта линзы */
            border-radius: 20px;
        }

        /* ПРИВЕТСТВИЕ */
        #welcome-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--main); z-index: 5000; display: flex; flex-direction: column;
            align-items: center; justify-content: center; text-align: center; padding: 20px; box-sizing: border-box;
        }
        .welcome-card { background: #fff; padding: 30px; border-radius: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 90%; }

        header { background: #fff; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .logo { font-weight: 900; font-size: 22px; cursor: pointer; }
        
        .container { padding: 15px; }
        .card { background: #fff; border-radius: 15px; padding: 15px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #eee; }

        /* ОКНА */
        .fs-window { position: fixed; top: 0; width: 100%; max-width: 450px; height: 100%; background: #fff; z-index: 1000; left: 100%; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); overflow-y: auto; padding: 20px; box-sizing: border-box; }
        .fs-window.active { left: 0; }
        
        .btn-big { width: 100%; padding: 16px; border: none; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .input-box { width: 100%; padding: 15px; margin: 10px 0; border: 1px solid #ddd; border-radius: 12px; box-sizing: border-box; }
        
        /* Чтобы текст не был мелким на планшетах */
        p, b, span { font-size: 16px; }
    </style>
</head>
<body>

<div class="fisheye-layer">
    <div id="welcome-screen">
        <div class="welcome-card" id="step-1">
            <i class="fa-solid fa-rocket" style="font-size: 40px;"></i>
            <h2>RX Delivery</h2>
            <p>Добро пожаловать! Мы адаптировали интерфейс под ваш смартфон.</p>
            <button class="btn-big" style="background:var(--dark); color:#fff" onclick="nextStep(2)">Далее</button>
        </div>
        <div class="welcome-card" id="step-2" style="display:none">
            <i class="fa-solid fa-shield-check" style="font-size: 40px;"></i>
            <h2>Безопасность</h2>
            <p>Заказы шифруются. Платежи через СБП подтверждаются номером заказа.</p>
            <button class="btn-big" style="background:var(--dark); color:#fff" onclick="goToAuth()">Начать</button>
        </div>
    </div>

    <header>
        <div class="logo">RX DELIVERY</div>
        <div style="display:flex; gap:20px; font-size: 22px;">
            <i class="fa-solid fa-basket-shopping" onclick="openWindow('cart-win')"></i>
            <i class="fa-solid fa-user-gear" onclick="openWindow('profile-win')"></i>
        </div>
    </header>

    <div class="container">
        <div class="card">
            <div><b>Картошка фри</b><br>110 ₽</div>
            <button class="btn-big" style="background:var(--main); width:50px" onclick="addToCart('Картошка фри', 110)">+</button>
        </div>
        <div class="card">
            <div><b>Кофе Американо</b><br>90 ₽</div>
            <button class="btn-big" style="background:var(--main); width:50px" onclick="addToCart('Кофе Американо', 90)">+</button>
        </div>
    </div>

    <div id="cart-win" class="fs-window">
        <span onclick="closeWindow('cart-win')" style="font-size:30px;">&times;</span>
        <h2>Корзина</h2>
        <div id="cart-list"></div>
        <div style="margin: 20px 0;">
            <label><input type="checkbox" id="leave-door" onchange="toggleDoor()"> Оставить у двери</label>
        </div>
        <h3>Итого: <span id="total">0</span> ₽</h3>
        <button class="btn-big" style="background:var(--dark); color:#fff" onclick="pay()">Оплатить СБП</button>
    </div>

    <div id="profile-win" class="fs-window">
        <span onclick="closeWindow('profile-win')" style="font-size:30px;">&times;</span>
        <h2>Настройки</h2>
        <input type="text" class="input-box" placeholder="Имя">
        <button class="btn-big" style="background:var(--main)">Сохранить</button>
        <button class="btn-big" style="border:1px solid red; color:red; background:none; margin-top:50px" onclick="deleteAcc()">УДАЛИТЬ ПРОФИЛЬ</button>
    </div>
</div>

<script>
    let cart = [];

    function nextStep(step) {
        document.getElementById('step-1').style.display = 'none';
        document.getElementById('step-2').style.display = 'block';
    }

    function goToAuth() {
        document.getElementById('welcome-screen').style.opacity = '0';
        setTimeout(() => { document.getElementById('welcome-screen').style.display = 'none'; }, 500);
    }

    function openWindow(id) { document.getElementById(id).classList.add('active'); }
    function closeWindow(id) { document.getElementById(id).classList.remove('active'); }

    function addToCart(name, price) {
        cart.push({name, price});
        render();
    }

    function render() {
        let t = 0;
        document.getElementById('cart-list').innerHTML = cart.map(i => {
            t += i.price;
            return `<div class="card"><span>${i.name}</span><b>${i.price} ₽</b></div>`;
        }).join('');
        document.getElementById('total').innerText = t;
    }

    function pay() {
        const id = 'RX-' + Math.floor(1000 + Math.random() * 9000);
        alert("Ваш код заказа: " + id + "\nУкажите его в СБП!");
        window.location.href = "https://c2c.cbrpay.ru/AS1I003EI3T7RIPG9018PF66SR2FTN0V";
    }

    function deleteAcc() {
        if(confirm("Удалить аккаунт?") && confirm("Точно?")) location.reload();
    }
</script>

</body>
</html>

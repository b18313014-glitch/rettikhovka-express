<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RX DELIVERY | AUTH V3</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --accent: #ff8233; --bg: #fffcf9; --border: 3px solid #000; }
        * { box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg); overflow: hidden; }
        
        .app-frame { width: 100%; max-width: 500px; height: 100vh; margin: 0 auto; position: relative; border-left: var(--border); border-right: var(--border); }
        .screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; flex-direction: column; background: var(--bg); z-index: 10; padding: 20px; }
        .screen.active { display: flex; }

        /* ПЛАШКА ПРИВЕТСТВИЯ */
        .welcome-card { background: #fff; border: var(--border); border-radius: 25px; padding: 30px; text-align: center; box-shadow: 6px 6px 0 #000; margin-top: 50px; }
        
        /* ФОРМЫ */
        .rx-input { width: 100%; padding: 15px; border: var(--border); border-radius: 15px; margin-bottom: 12px; font-weight: 600; font-size: 16px; }
        .btn-main { width: 100%; padding: 18px; border: var(--border); border-radius: 15px; font-weight: 900; cursor: pointer; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; gap: 10px; box-shadow: 4px 4px 0 #000; font-size: 16px; }
        .btn-main:active { transform: translate(2px, 2px); box-shadow: 2px 2px 0 #000; }

        .link-btn { color: var(--accent); font-weight: 800; cursor: pointer; text-decoration: underline; margin-top: 10px; text-align: center; display: block; }
    </style>
</head>
<body>

<div class="app-frame">

    <div id="scr-welcome" class="screen active">
        <div class="welcome-card">
            <div style="font-size: 60px;">🚀</div>
            <h1 style="font-weight: 900;">ДОБРО ПОЖАЛОВАТЬ!</h1>
            <p>Мы тебя ждали. Готов заказать что-нибудь вкусное в Реттиховке?</p>
            <button class="btn-main" style="background: var(--accent); color: #fff;" onclick="switchScreen('scr-register')">ВПЕРВЫЕ У НАС</button>
            <button class="btn-main" style="background: #fff;" onclick="switchScreen('scr-auth')">Я УЖЕ С ВАМИ</button>
        </div>
    </div>

    <div id="scr-register" class="screen">
        <h2 style="font-weight: 900; text-align: center;">РЕГИСТРАЦИЯ</h2>
        <input type="email" id="reg-email" class="rx-input" placeholder="Твой Email">
        <input type="password" id="reg-pass" class="rx-input" placeholder="Придумай пароль">
        <input type="password" id="reg-confirm" class="rx-input" placeholder="Повтори пароль">
        <button class="btn-main" style="background: var(--accent); color: #fff;" onclick="handleRegister()">СОЗДАТЬ АККАУНТ</button>
        <span class="link-btn" onclick="switchScreen('scr-auth')">Уже есть аккаунт? Войти</span>
    </div>

    <div id="scr-auth" class="screen">
        <h2 style="font-weight: 900; text-align: center;">С ВОЗВРАЩЕНИЕМ!</h2>
        <div style="margin-top: 20px;">
            <button class="btn-main" style="background: #fff;" onclick="loginGoogle()">
                <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" width="20"> ПРОДОЛЖИТЬ GOOGLE
            </button>
            <button class="btn-main" style="background: #000; color: #fff;" onclick="loginSMS()">
                <i class="fa-solid fa-comment-sms"></i> ВОЙТИ ПО SMS
            </button>
            <div style="text-align: center; margin: 15px 0;">или через почту</div>
            <input type="email" id="auth-email" class="rx-input" placeholder="Email">
            <input type="password" id="auth-pass" class="rx-input" placeholder="Пароль">
            <button class="btn-main" style="background: var(--accent); color: #fff;" onclick="handleLoginEmail()">ВОЙТИ</button>
            <span class="link-btn" onclick="switchScreen('scr-register')">Нет аккаунта? Регистрация</span>
        </div>
    </div>

    <div id="scr-home" class="screen">
        <h1 style="text-align: center;">ТЫ В СИСТЕМЕ! ✅</h1>
        <p style="text-align: center;">Теперь ты можешь заказывать еду.</p>
        <button class="btn-main" onclick="location.reload()">ВЫЙТИ</button>
    </div>

</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBD8BzKaEBxcD-e24ypRh1qZ-iCvZZY6nQ",
      authDomain: "deliverygov11.firebaseapp.com",
      projectId: "deliverygov11",
      storageBucket: "deliverygov11.firebasestorage.app",
      messagingSenderId: "562994407235",
      appId: "1:562994407235:web:27765b2d4916e82ec871f6"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    // ПРОВЕРКА СОСТОЯНИЯ (Чтобы не выкидывало обратно на вход)
    onAuthStateChanged(auth, (user) => {
        if (user) {
            console.log("Пользователь вошел:", user.email);
            switchScreen('scr-home'); // СРАЗУ на главную
        }
    });

    window.switchScreen = (id) => {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    };

    // GOOGLE ВХОД
    window.loginGoogle = async () => {
        try {
            await signInWithPopup(auth, provider);
            // switchScreen не нужен, onAuthStateChanged сам сработает
        } catch (e) { alert("Ошибка Google: " + e.message); }
    };

    // РЕГИСТРАЦИЯ ПО ПОЧТЕ
    window.handleRegister = async () => {
        const email = document.getElementById('reg-email').value;
        const pass = document.getElementById('reg-pass').value;
        const confirm = document.getElementById('reg-confirm').value;

        if (pass !== confirm) return alert("Пароли не совпадают!");
        if (pass.length < 6) return alert("Пароль должен быть от 6 символов!");

        try {
            await createUserWithEmailAndPassword(auth, email, pass);
            alert("Аккаунт создан!");
        } catch (e) { alert("Ошибка: " + e.message); }
    };

    // ВХОД ПО ПОЧТЕ
    window.handleLoginEmail = async () => {
        const email = document.getElementById('auth-email').value;
        const pass = document.getElementById('auth-pass').value;
        try {
            await signInWithEmailAndPassword(auth, email, pass);
        } catch (e) { alert("Ошибка входа: " + e.message); }
    };

    window.loginSMS = () => { alert("Система SMS настраивается в Firebase Console (Phone Auth)"); };
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RETTIKHOVKA EXPRESS</title>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --main: #007bff; --bg: #ffffff; --text: #000000; --card: #f5f5f5; }
        /* ТЕМЫ */
        body.dark-theme { --bg: #0a0a0a; --text: #ffffff; --card: #1a1a1a; }
        body.rx-theme { --bg: #000510; --text: #ffffff; --card: #001530; --main: #00d4ff; }

        body { background: var(--bg); color: var(--text); font-family: 'Montserrat', sans-serif; margin: 0; transition: 0.3s; }
        .header { padding: 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; background: var(--bg); z-index: 100; }
        
        .product-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 15px; }
        .p-card { background: var(--card); border-radius: 20px; padding: 10px; text-align: center; position: relative; overflow: hidden; }
        .p-img { width: 100%; height: 120px; object-fit: contain; border-radius: 15px; background: #fff; }
        
        .add-btn { background: var(--main); color: white; border: none; width: 40px; height: 40px; border-radius: 50%; font-size: 24px; font-weight: 900; cursor: pointer; position: absolute; bottom: 10px; right: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        
        /* КОРЗИНА */
        .cart-bar { position: fixed; bottom: 20px; left: 20px; right: 20px; background: var(--main); color: white; padding: 15px; border-radius: 20px; display: none; justify-content: space-between; font-weight: 900; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }

        .settings-btn { cursor: pointer; font-size: 20px; }
    </style>
</head>
<body id="app-body">

<div class="header">
    <h1 style="font-weight: 900; margin:0;">RX</h1>
    <div class="settings-btn" onclick="toggleSettings()">⚙️</div>
</div>

<div id="settings-menu" style="display:none; padding: 20px; background: var(--card); margin: 15px; border-radius: 15px;">
    <h3>Сменить тему:</h3>
    <button onclick="setTheme('light')">Светлая</button>
    <button onclick="setTheme('dark')">Темная</button>
    <button onclick="setTheme('rx')">RX Neon</button>
</div>

<div class="product-grid" id="catalog">
    </div>

<div class="cart-bar" id="cart-view" onclick="goToCheckout()">
    <span>КОРЗИНА: <span id="cart-count">0</span></span>
    <span>ИТОГО: <span id="cart-total">0</span> ₽</span>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBD8BzKaEBxcD-e24ypRh1qZ-iCvZZY6nQ",
        authDomain: "deliverygov11.firebaseapp.com",
        projectId: "deliverygov11"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let cart = [];

    // 1. ЗАГРУЗКА ТОВАРОВ ИЗ АДМИНКИ
    function loadProducts() {
        db.collection('products').orderBy('date', 'desc').onSnapshot(snap => {
            const catalog = document.getElementById('catalog');
            catalog.innerHTML = '';
            snap.forEach(doc => {
                const p = doc.data();
                const image = p.img || 'https://via.placeholder.com/150';
                catalog.innerHTML += `
                    <div class="p-card">
                        <img src="${image}" class="p-img">
                        <div style="font-weight:900; margin-top:10px; font-size:14px;">${p.name}</div>
                        <div style="color:var(--main); font-weight:700;">${p.price} ₽</div>
                        <button class="add-btn" onclick="addToCart('${doc.id}', '${p.name}', ${p.price})">+</button>
                    </div>
                `;
            });
        });
    }

    // 2. ЛОГИКА ПЛЮСИКА (КОРЗИНА)
    function addToCart(id, name, price) {
        cart.push({ id, name, price });
        updateCartUI();
        
        // Маленький эффект вибрации или анимации
        navigator.vibrate(50); 
    }

    function updateCartUI() {
        const cartView = document.getElementById('cart-view');
        const cartCount = document.getElementById('cart-count');
        const cartTotal = document.getElementById('cart-total');

        if(cart.length > 0) {
            cartView.style.display = 'flex';
            cartCount.innerText = cart.length;
            const total = cart.reduce((sum, item) => sum + item.price, 0);
            cartTotal.innerText = total;
        } else {
            cartView.style.display = 'none';
        }
    }

    // 3. НАСТРОЙКИ ТЕМ
    function toggleSettings() {
        const menu = document.getElementById('settings-menu');
        menu.style.display = menu.style.display === 'none' ? 'block' : 'none';
    }

    function setTheme(theme) {
        const body = document.getElementById('app-body');
        body.className = '';
        if(theme === 'dark') body.classList.add('dark-theme');
        if(theme === 'rx') body.classList.add('rx-theme');
        localStorage.setItem('rx-theme', theme);
    }

    // Сохраняем тему при перезагрузке
    const savedTheme = localStorage.getItem('rx-theme');
    if(savedTheme) setTheme(savedTheme);

    loadProducts();
</script>
</body>
</html>

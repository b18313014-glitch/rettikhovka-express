<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RX HUB - FULL EDITION</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --main: #ffcc00; --dark: #1a1a1a; --gray: #f4f4f4; --green: #2ecc71; --red: #e74c3c; --ozon: #005bff; }
        * { box-sizing: border-box; font-family: 'Ubuntu', sans-serif; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body { background: #000; display: flex; justify-content: center; height: 100vh; overflow: hidden; }
        #app { width: 100%; max-width: 500px; background: var(--gray); position: relative; height: 100vh; display: flex; flex-direction: column; }

        /* Страницы */
        .page { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: var(--gray); z-index: 100; display: none; flex-direction: column; }
        .page.active { display: flex; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        header { background: #fff; padding: 18px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; }
        .btn-action { width: 100%; padding: 18px; border: none; border-radius: 16px; font-weight: bold; cursor: pointer; font-size: 15px; transition: 0.4s; text-transform: uppercase; }

        /* Анимация кода */
        .code-container { display: flex; gap: 10px; justify-content: center; margin: 25px 0; }
        .code-input { width: 55px; height: 70px; text-align: center; font-size: 28px; font-weight: bold; border: 2px solid #ddd; border-radius: 14px; background: #fff; outline: none; transition: 0.3s; }
        
        .code-input.error { border-color: var(--red); color: var(--red); animation: shake 0.3s; }
        .code-input.success { border-color: var(--green); color: var(--green); transform: scale(1.05); }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }

        #btn-continue { opacity: 0; transform: translateY(20px); pointer-events: none; background: var(--green); color: #fff; margin-top: 20px; }
        #btn-continue.show { opacity: 1; transform: translateY(0); pointer-events: auto; }

        .store-card { background: #fff; margin: 10px 15px; padding: 20px; border-radius: 20px; cursor: pointer; display: flex; align-items: center; gap: 15px; transition: 0.2s; }
        .store-card:active { transform: scale(0.96); background: #fafafa; }
    </style>
</head>
<body>

<div id="app">
    <div id="auth-screen" class="page active" style="background: #fff; justify-content: center; padding: 30px; z-index: 1000;">
        <div id="step-1" style="width: 100%; text-align: center;">
            <h2 style="margin-bottom: 30px; font-weight: 900;">RX DELIVERY</h2>
            
            <button class="btn-action" style="background: #fff; border: 2px solid #eee; display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 15px; color: #555;">
                <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_打%22G%22_Logo.svg" style="width: 18px;"> Войти через Google
            </button>

            <div style="color:#ccc; font-size:12px; margin: 15px 0;">ИЛИ ПОЧТА</div>

            <input type="email" id="reg-email" class="btn-action" style="background:#f9f9f9; border:1px solid #eee; margin-bottom:10px; text-transform:none;" placeholder="E-mail">
            <input type="password" id="reg-pass" class="btn-action" style="background:#f9f9f9; border:1px solid #eee; margin-bottom:20px; text-transform:none;" placeholder="Пароль">
            
            <button class="btn-action" style="background: var(--main);" onclick="goToStep2()">ДАЛЕЕ</button>
        </div>

        <div id="step-2" style="display: none; width: 100%; text-align: center;">
            <h2 style="margin-bottom: 10px;">ПОДТВЕРЖДЕНИЕ</h2>
            <p style="color:#888;">Введите код 7777</p>
            <div class="code-container">
                <input type="number" class="code-input" id="c1" oninput="moveNext(this, 'c2')">
                <input type="number" class="code-input" id="c2" oninput="moveNext(this, 'c3')">
                <input type="number" class="code-input" id="c3" oninput="moveNext(this, 'c4')">
                <input type="number" class="code-input" id="c4" oninput="checkFinalCode()">
            </div>
            <button id="btn-continue" class="btn-action" onclick="finishAuth()">ПРОДОЛЖИТЬ</button>
        </div>
    </div>

    <header>
        <b>RX HUB</b>
        <div style="display:flex; gap:18px; font-size:22px;">
            <i class="fa-solid fa-cart-shopping" onclick="openPage('cart-page')"></i>
            <i class="fa-solid fa-circle-user" onclick="openPage('profile-page')"></i>
        </div>
    </header>

    <div style="padding: 15px; flex: 1;">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
            <button class="btn-action" style="background: var(--main); height: 130px; display:flex; flex-direction:column; justify-content:center; align-items:center; gap:10px;" onclick="openPage('select-store-page')">
                <i class="fa-solid fa-shop fa-2x"></i> ЕДА
            </button>
            <button class="btn-action" style="background: var(--ozon); color:#fff; height: 130px; display:flex; flex-direction:column; justify-content:center; align-items:center; gap:10px;" onclick="alert('Озон скоро!')">
                <i class="fa-solid fa-barcode fa-2x"></i> OZON
            </button>
        </div>
    </div>

    <div id="select-store-page" class="page">
        <header><i class="fa-solid fa-chevron-left" onclick="closePage('select-store-page')"></i><b>МАГАЗИНЫ</b><div></div></header>
        <div class="store-card" onclick="selectStore('Алина')">
            <span style="font-size:30px;">🏪</span> <div><b>Магазин "Алина"</b><br><small>15-30 мин</small></div>
        </div>
        <div class="store-card" onclick="selectStore('Дежурный')">
            <span style="font-size:30px;">🏪</span> <div><b>Магазин "Дежурный"</b><br><small>10-20 мин</small></div>
        </div>
    </div>

    <div id="cart-page" class="page">
        <header><i class="fa-solid fa-xmark" onclick="closePage('cart-page')"></i><b>КОРЗИНА</b><div></div></header>
        <div id="cart-items-list" style="padding: 15px; flex: 1; overflow-y: auto;">
            </div>
        <div id="cart-footer" style="padding: 20px; background: #fff; border-radius: 25px 25px 0 0; display: none;">
            <div style="display:flex; justify-content:space-between; margin-bottom:15px;"><b>ИТОГО:</b><b id="total-price">0 ₽</b></div>
            <button class="btn-action" id="pay-btn-main" style="background: var(--main);" onclick="alert('Переход к оплате...')">
                ЗАКАЗАТЬ ИЗ: ???
            </button>
        </div>
    </div>

    <div id="profile-page" class="page">
        <header><i class="fa-solid fa-chevron-left" onclick="closePage('profile-page')"></i><b>ПРОФИЛЬ</b><div></div></header>
        <div style="padding: 20px; text-align: center;">
            <div style="width:90px; height:90px; background:#fff; border-radius:50%; margin: 0 auto 15px; display:flex; align-items:center; justify-content:center; font-size:40px; box-shadow:0 4px 10px rgba(0,0,0,0.1);">👦</div>
            <h2>Богдан</h2>
            <div style="background:#fff; border-radius:15px; margin-top:20px; text-align:left;">
                <div style="padding:15px; border-bottom:1px solid #eee;">Почта: <span style="color:#888">rx@mail.ru</span></div>
                <div style="padding:15px;">Магазин: <span id="def-store-name" style="color:#888">Не выбран</span></div>
            </div>
            <button class="btn-action" style="background:#ff4444; color:#fff; margin-top:30px;" onclick="location.reload()">ВЫЙТИ</button>
        </div>
    </div>
</div>

<script>
    let cart = [];
    let currentStore = "";

    function openPage(id) { document.getElementById(id).classList.add('active'); }
    function closePage(id) { document.getElementById(id).classList.remove('active'); }

    // Авторизация
    function goToStep2() {
        if(!document.getElementById('reg-email').value) return alert("Введите почту!");
        document.getElementById('step-1').style.display = 'none';
        document.getElementById('step-2').style.display = 'block';
    }

    function moveNext(curr, nextId) { if(curr.value.length > 0) document.getElementById(nextId).focus(); }

    function checkFinalCode() {
        const code = document.getElementById('c1').value + document.getElementById('c2').value + document.getElementById('c3').value + document.getElementById('c4').value;
        const ins = document.querySelectorAll('.code-input');
        if(code === "7777") {
            ins.forEach((inp, i) => setTimeout(() => inp.classList.add('success'), i * 150));
            setTimeout(() => document.getElementById('btn-continue').classList.add('show'), 600);
        } else if(code.length === 4) {
            ins.forEach(inp => { inp.classList.add('error'); setTimeout(() => inp.classList.remove('error'), 400); });
        }
    }

    function finishAuth() { document.getElementById('auth-screen').style.display = 'none'; }

    // Магазины и Корзина
    function selectStore(name) {
        currentStore = name;
        cart.push({name: "Пицца Комбо", price: 750}); // Тестовый товар для проверки корзины
        renderCart();
        closePage('select-store-page');
        openPage('cart-page');
    }

    function renderCart() {
        const list = document.getElementById('cart-items-list');
        const foot = document.getElementById('cart-footer');
        const btn = document.getElementById('pay-btn-main');
        
        if(cart.length > 0) {
            list.innerHTML = cart.map(i => `<div style="background:#fff; padding:15px; border-radius:15px; margin-bottom:10px; display:flex; justify-content:space-between;"><b>${i.name}</b><span>${i.price} ₽</span></div>`).join('');
            document.getElementById('total-price').innerText = "750 ₽";
            btn.innerText = "ЗАКАЗАТЬ ИЗ: " + currentStore.toUpperCase();
            foot.style.display = 'block';
        }
    }
</script>
</body>
</html>

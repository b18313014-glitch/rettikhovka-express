<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RX DELIVERY | REAL SYSTEM</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --border: 3px solid #000; --accent: #FF5733; --shadow: 4px 4px 0px #000; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; font-family: 'Inter', sans-serif; background: #fff; overflow-x: hidden; }

        /* ЭКРАН ВХОДА */
        .auth-screen {
            height: 100vh; display: flex; flex-direction: column;
            align-items: center; justify-content: center; padding: 20px;
        }
        .input-ui {
            width: 300px; padding: 15px; border: var(--border);
            border-radius: 12px; margin-bottom: 10px; font-weight: bold;
        }
        .error-msg { color: red; font-size: 12px; margin-bottom: 10px; display: none; }

        /* ГЛАВНЫЙ ЭКРАН */
        #app { display: none; }
        .header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 20px; border-bottom: var(--border); position: sticky; top: 0; background: #fff; z-index: 10;
        }

        /* КАТЕГОРИИ (СКРОЛЛ) */
        .cat-row {
            display: flex; gap: 15px; overflow-x: auto; padding: 15px 20px;
            background: #fdfdfd; scrollbar-width: none;
        }
        .cat-row::-webkit-scrollbar { display: none; }
        .cat-item { min-width: 70px; text-align: center; cursor: pointer; }
        .cat-circle { 
            width: 55px; height: 55px; border: var(--border); border-radius: 50%;
            display: flex; align-items: center; justify-content: center; font-size: 20px; margin-bottom: 5px;
        }

        /* КНОПКИ ДЕЙСТВИЯ */
        .actions { padding: 20px; display: flex; flex-direction: column; align-items: center; gap: 12px; }
        .btn-main {
            width: 320px; padding: 18px; border: var(--border); border-radius: 15px;
            font-weight: 900; text-transform: uppercase; cursor: pointer;
            box-shadow: var(--shadow); display: flex; justify-content: space-between;
        }
        .btn-main:active { transform: translate(2px, 2px); box-shadow: none; }

        /* ТОВАРЫ */
        .feed { padding: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .card { border: var(--border); border-radius: 12px; padding: 10px; background: #fff; }
        .card img { width: 100%; height: 80px; background: #eee; border-radius: 6px; margin-bottom: 5px; }

        /* ПРОФИЛЬ (МОДАЛКА) */
        .profile-view {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #fff; z-index: 100; flex-direction: column; padding: 20px;
        }
    </style>
</head>
<body>

    <section id="login-view" class="auth-screen">
        <h1 style="font-weight: 900;">RX DELIVERY</h1>
        <input type="email" id="email-field" class="input-ui" placeholder="Введите почту (с @)">
        <p id="error-txt" class="error-msg">Почта должна содержать @</p>
        
        <button class="btn-main" style="background: #000; color: #fff; width: 300px; box-shadow: none;" onclick="checkAuth()">
            <span>Войти</span> <i class="fa-solid fa-arrow-right"></i>
        </button>

        <div style="margin-top: 20px; cursor: pointer;" onclick="googleAuth()">
            <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_Color_Icon.svg" width="18">
            <b style="margin-left: 10px;">Продолжить с Google</b>
        </div>
    </section>

    <div id="app">
        <header class="header">
            <b>RX <span style="color: var(--accent);">SYSTEM</span></b>
            <div onclick="toggleProfile(true)" style="width:40px; height:40px; border:var(--border); border-radius:50%; display:flex; align-items:center; justify-content:center; background:#FFD700;">
                <i class="fa-solid fa-user"></i>
            </div>
        </header>

        <div class="cat-row">
            <div class="cat-item" onclick="filter('chips')"><div class="cat-circle" style="background:#FFE4E1;">🍿</div><span>Снеки</span></div>
            <div class="cat-item" onclick="filter('drinks')"><div class="cat-circle" style="background:#E0FFFF;">🥤</div><span>Вода</span></div>
            <div class="cat-item" onclick="filter('sweet')"><div class="cat-circle" style="background:#FFFACD;">🍫</div><span>Сладкое</span></div>
            <div class="cat-item" onclick="filter('ozon')"><div class="cat-circle" style="background:#E6E6FA;">📦</div><span>Озон</span></div>
        </div>

        <div class="actions">
            <div class="btn-main" style="background: var(--accent); color: #fff;">
                <span>Заказать доставку</span> <i class="fa-solid fa-truck-fast"></i>
            </div>
            <div class="btn-main" style="background: #005BFF; color: #fff;">
                <span>Забрать из OZON</span> <i class="fa-solid fa-box"></i>
            </div>
        </div>

        <div class="feed">
            <p style="font-weight: 900; text-transform: uppercase;">Вам может понравиться</p>
            <div class="grid">
                <div class="card" data-cat="chips"><div></div><b>Кириешки</b><br><small>35₽</small></div>
                <div class="card" data-cat="drinks"><div></div><b>Добрый Кола</b><br><small>95₽</small></div>
            </div>
        </div>
    </div>

    <div id="profile" class="profile-view">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <i class="fa-solid fa-xmark fa-2x" onclick="toggleProfile(false)"></i>
            <b>НАСТРОЙКИ</b>
            <span></span>
        </div>
        <div style="margin-top: 40px; border: var(--border); padding: 20px; border-radius: 15px;">
            <p>Email: <span id="user-email-display">---</span></p>
            <p>Статус: <span style="color:red; font-weight:bold;">DEV</span></p>
        </div>
        <button class="btn-main" style="background:red; color:#fff; width:100%; margin-top:auto; box-shadow:none;" onclick="deleteAcc()">Удалить аккаунт</button>
    </div>

    <script>
        const validEmails = ["bogdan@rx.ru", "test@mail.ru", "dev@google.com"];

        function checkAuth() {
            const mail = document.getElementById('email-field').value;
            const err = document.getElementById('error-txt');

            // 1. Проверка на символ @
            if (!mail.includes('@')) {
                err.style.display = 'block';
                return;
            }
            err.style.display = 'none';

            // 2. Имитация поиска в базе данных
            if (validEmails.includes(mail)) {
                loginSuccess(mail);
            } else {
                alert("Пользователь не найден в базе данных!");
            }
        }

        function loginSuccess(mail) {
            document.getElementById('login-view').style.display = 'none';
            document.getElementById('app').style.display = 'block';
            document.getElementById('user-email-display').innerText = mail;
        }

        function googleAuth() {
            alert("Подключение к Google Firebase API...");
            loginSuccess("google-user@gmail.com");
        }

        function toggleProfile(show) {
            document.getElementById('profile').style.display = show ? 'flex' : 'none';
        }

        function filter(cat) {
            alert("Фильтр: " + cat);
        }

        function deleteAcc() {
            if(confirm("Удалить аккаунт навсегда?")) {
                if(confirm("UID будет стерт из базы. Точно?")) {
                    window.location.reload();
                }
            }
        }
    </script>
</body>
</html>

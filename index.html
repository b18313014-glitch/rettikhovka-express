<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RX | Welcome</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.0/firebase-auth-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { --blue: #007bff; --bg: #050505; --card: #121212; --red: #ff4757; --green: #2ecc71; }
        body { background: var(--bg); color: #fff; font-family: 'Montserrat', sans-serif; margin: 0; overflow: hidden; }
        .screen { display: none; height: 100vh; padding: 30px; box-sizing: border-box; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .active { display: flex; }

        h1 { font-size: 40px; font-weight: 900; margin-bottom: 10px; color: var(--blue); }
        p { opacity: 0.8; line-height: 1.5; }

        .btn { background: var(--blue); color: white; border: none; padding: 18px; border-radius: 15px; width: 100%; font-weight: 900; cursor: pointer; margin-top: 15px; font-size: 16px; }
        .btn-google { background: #fff; color: #000; }
        
        input { background: var(--card); border: 1px solid #333; padding: 15px; border-radius: 12px; color: white; width: 100%; box-sizing: border-box; margin-bottom: 10px; font-size: 16px; }
        
        /* Сетка для кода восстановления */
        .code-inputs { display: flex; gap: 10px; justify-content: center; margin-top: 20px; }
        .code-digit { width: 45px; height: 55px; background: var(--card); border: 2px solid #333; border-radius: 10px; text-align: center; font-size: 24px; font-weight: 900; transition: 0.3s; }
        .code-digit.wrong { border-color: var(--red); color: var(--red); }
        .code-digit.correct { border-color: var(--green); color: var(--green); }

        .link { color: var(--blue); font-size: 14px; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

<div id="scr-welcome" class="screen active">
    <h1>RETTIKHOVKA<br>EXPRESS</h1>
    <p>Твой сервис самой быстрой доставки еды и товаров в Реттиховке. Заказывай из магазинов, забирай из OZON — мы всё привезём!</p>
    <button class="btn" onclick="showScr('auth')">ПРОДОЛЖИТЬ</button>
</div>

<div id="scr-auth" class="screen">
    <h2>ВХОД</h2>
    <input type="email" id="email" placeholder="Почта">
    <input type="password" id="pass" placeholder="Пароль">
    <div class="link" onclick="showScr('reset')">Забыли пароль?</div>
    
    <button class="btn" onclick="emailAuth()">ВОЙТИ</button>
    <button class="btn btn-google" onclick="googleAuth()">🚀 ПРОДОЛЖИТЬ С GOOGLE</button>
</div>

<div id="scr-reset" class="screen">
    <h2>СБРОС ПАРОЛЯ</h2>
    <p id="reset-msg">Введите почту, мы отправим код</p>
    <input type="email" id="reset-email" placeholder="Почта для кода">
    <button class="btn" id="send-code-btn" onclick="sendResetCode()">ОТПРАВИТЬ КОД</button>

    <div class="code-inputs" id="code-box" style="display:none;">
        <input type="text" maxlength="1" class="code-digit" oninput="checkDigit(this, 0)">
        <input type="text" maxlength="1" class="code-digit" oninput="checkDigit(this, 1)">
        <input type="text" maxlength="1" class="code-digit" oninput="checkDigit(this, 2)">
        <input type="text" maxlength="1" class="code-digit" oninput="checkDigit(this, 3)">
    </div>
    <div class="link" style="margin-top:20px" onclick="showScr('auth')">Вернуться назад</div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBD8BzKaEBxcD-e24ypRh1qZ-iCvZZY6nQ",
        authDomain: "deliverygov11.firebaseapp.com",
        projectId: "deliverygov11",
        storageBucket: "deliverygov11.firebasestorage.app",
        messagingSenderId: "562994407235",
        appId: "1:562994407235:web:27765b2d4916e82ec871f6"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    // Навигация
    function showScr(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('scr-' + id).classList.add('active');
    }

    // Google Auth
    function googleAuth() {
        const provider = new firebase.auth.GoogleAuthProvider();
        auth.signInWithPopup(provider).then(() => { location.href = 'index.html'; });
    }

    // Email Auth
    function emailAuth() {
        const e = document.getElementById('email').value;
        const p = document.getElementById('pass').value;
        auth.signInWithEmailAndPassword(e, p)
            .then(() => { location.href = 'index.html'; })
            .catch(err => alert("Ошибка: " + err.message));
    }

    // Логика кода восстановления
    const SECRET_CODE = "1234"; // Имитация кода для проверки анимации

    function sendResetCode() {
        const email = document.getElementById('reset-email').value;
        if(!email) return alert("Введите почту!");
        document.getElementById('reset-msg').innerText = "Код отправлен на " + email;
        document.getElementById('code-box').style.display = 'flex';
        document.getElementById('send-code-btn').style.display = 'none';
    }

    function checkDigit(el, index) {
        const digits = document.querySelectorAll('.code-digit');
        if (el.value === SECRET_CODE[index]) {
            el.classList.remove('wrong');
            el.classList.add('correct');
            if (index < 3) digits[index + 1].focus();
        } else {
            el.classList.add('wrong');
            el.classList.remove('correct');
        }

        // Если все верно
        const result = Array.from(digits).map(d => d.value).join('');
        if (result === SECRET_CODE) {
            setTimeout(() => { alert("Пароль сброшен! Войдите заново."); showScr('auth'); }, 500);
        }
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RX DELIVERY | ACTIVE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --accent: #ff8233;
            --bg: #fffcf9;
            --border: 3px solid #000;
            --shadow: 6px 6px 0px #000;
        }
        body.theme-beige { --bg: #f5f5dc; --accent: #d2b48c; }
        body.theme-orange { --bg: #fff5ed; --accent: #ff6600; }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Inter', sans-serif; }
        body { margin: 0; background: var(--bg); overflow: hidden; transition: 0.3s; color: #1a1a1a; }

        .app { width: 100%; max-width: 500px; height: 100vh; margin: 0 auto; position: relative; border-left: var(--border); border-right: var(--border); background: var(--bg); }

        /* ЭКРАНЫ */
        .screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; flex-direction: column; background: var(--bg); z-index: 10; }
        .screen.active { display: flex; animation: slideUp 0.4s ease-out; }

        /* ПАНЕЛИ (BOTTOM SHEETS) */
        .sheet { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%) translateY(100%); width: 100%; max-width: 500px; background: #fff; border-top: 4px solid #000; border-radius: 35px 35px 0 0; z-index: 1000; transition: 0.5s cubic-bezier(0, 0.5, 0, 1); padding: 25px; }
        .sheet.open { transform: translateX(-50%) translateY(0); }
        .handle { width: 60px; height: 6px; background: #ddd; border-radius: 10px; margin: -10px auto 20px; cursor: pointer; }

        /* КНОПКИ */
        .btn-main { width: 100%; padding: 20px; border: var(--border); border-radius: 20px; font-weight: 900; font-size: 16px; box-shadow: var(--shadow); cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 15px; background: #fff; }
        .btn-main:active { transform: translate(4px, 4px); box-shadow: 2px 2px 0 #000; }
        .btn-icon { width: 50px; height: 50px; background: #fff; border: var(--border); border-radius: 15px; display: flex; align-items: center; justify-content: center; box-shadow: 4px 4px 0 #000; cursor: pointer; }

        header { padding: 20px; display: flex; justify-content: space-between; align-items: center; }
        .p-card { background:#fff; border:var(--border); padding:15px; border-radius:20px; box-shadow:4px 4px 0 #000; }
        
        @keyframes slideUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body>

<div class="app">

    <div id="scr-onboarding" class="screen active">
        <div style="flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px; text-align: center;">
            <div id="ob-icon" style="font-size: 100px; margin-bottom: 20px;">👋</div>
            <h1 id="ob-title" style="font-size: 32px; font-weight: 900;">ПРИВЕТ В RX!</h1>
            <p id="ob-text" style="font-weight: 600; color: #666;">Лучшая доставка в Реттиховке.</p>
        </div>
        <div style="padding: 40px; display: flex; justify-content: space-between;">
            <button class="btn-icon" onclick="moveOb(-1)"><i class="fa-solid fa-arrow-left"></i></button>
            <button class="btn-icon" onclick="moveOb(1)"><i class="fa-solid fa-arrow-right"></i></button>
        </div>
    </div>

    <div id="scr-auth" class="screen">
        <div style="flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px;">
            <h2 style="font-weight:900;">ВХОД В СИСТЕМУ</h2>
            <button class="btn-main" onclick="loginGoogle()">
                <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" width="20"> GOOGLE ВХОД
            </button>
            <button class="btn-main" style="background: #000; color: #fff;">ВХОД ПО SMS</button>
        </div>
    </div>

    <div id="scr-home" class="screen">
        <header>
            <div class="btn-icon" onclick="openSheet('sheet-profile')"><i class="fa-solid fa-user-gear"></i></div>
            <b style="font-size: 22px;">RX DELIVERY</b>
            <div class="btn-icon" onclick="openSheet('sheet-cart')"><i class="fa-solid fa-basket-shopping"></i></div>
        </header>
        <div style="flex: 1; display: flex; flex-direction: column; justify-content: center; padding: 20px;">
            <button class="btn-main" style="background: var(--accent); padding: 40px;" onclick="changeScreen('scr-shop')">ЗАКАЗАТЬ ЕДУ</button>
            <button class="btn-main" style="background: #4d88ff; color: #fff;">ЗАБРАТЬ OZON</button>
        </div>
    </div>

    <div id="scr-shop" class="screen">
        <header>
            <div class="btn-icon" onclick="changeScreen('scr-home')"><i class="fa-solid fa-xmark"></i></div>
            <h2 style="font-weight: 900;">МАГАЗИН</h2>
            <div></div>
        </header>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 20px;">
            <div class="p-card"><b>Кофе</b><br>60₽ <button style="float:right">+</button></div>
            <div class="p-card"><b>Доширак</b><br>65₽ <button style="float:right">+</button></div>
        </div>
    </div>

    <div id="sheet-profile" class="sheet">
        <div class="handle"></div>
        <h2 style="text-align:center;">ПРОФИЛЬ</h2>
        <input type="text" id="user-display-name" value="Богдан" style="width:100%; padding:15px; border-radius:12px; border:2px solid #eee; margin-bottom:20px;">
        <label>ТЕМА</label>
        <div style="display: flex; gap: 15px; margin-bottom: 30px;">
            <div onclick="setTheme('default')" style="width:40px; height:40px; background:#fff; border:2px solid #000; border-radius:50%;"></div>
            <div onclick="setTheme('beige')" style="width:40px; height:40px; background:#f5f5dc; border:2px solid #000; border-radius:50%;"></div>
            <div onclick="setTheme('orange')" style="width:40px; height:40px; background:#ff8233; border:2px solid #000; border-radius:50%;"></div>
        </div>
        <button class="btn-main" style="background: red; color: #fff; border: none;" onclick="deleteUserAccount()">УДАЛИТЬ АККАУНТ</button>
    </div>

    <div id="sheet-cart" class="sheet">
        <div class="handle"></div>
        <h2 style="text-align:center;">КОРЗИНА</h2>
        <select style="width:100%; padding:15px; border:2px solid #000; border-radius:15px; margin-bottom:20px;">
            <option>Оставить у двери (0₽)</option>
            <option>Ждать курьера (Платно)</option>
        </select>
        <button class="btn-main" style="background: #00ff00;">ОПЛАТИТЬ</button>
    </div>

</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup, deleteUser, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    // ТВОИ КЛЮЧИ ИНТЕГРИРОВАНЫ
    const firebaseConfig = {
      apiKey: "AIzaSyBD8BzKaEBxcD-e24ypRh1qZ-iCvZZY6nQ",
      authDomain: "deliverygov11.firebaseapp.com",
      projectId: "deliverygov11",
      storageBucket: "deliverygov11.firebasestorage.app",
      messagingSenderId: "562994407235",
      appId: "1:562994407235:web:27765b2d4916e82ec871f6"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    // ПРОВЕРКА ВХОДА
    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById('user-display-name').value = user.displayName || "Пользователь";
            if (document.getElementById('scr-auth').classList.contains('active')) changeScreen('scr-home');
        }
    });

    window.loginGoogle = async () => {
        try {
            await signInWithPopup(auth, provider);
        } catch (e) { alert("Ошибка входа: " + e.message); }
    };

    window.deleteUserAccount = async () => {
        if(confirm("Удалить профиль? Это нельзя отменить.")) {
            try {
                await deleteUser(auth.currentUser);
                location.reload();
            } catch (e) { alert("Нужно перевойти для удаления"); }
        }
    };

    // МЕНЕДЖЕР ЭКРАНОВ
    window.changeScreen = (id) => {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.sheet').forEach(sh => sh.classList.remove('open'));
        document.getElementById(id).classList.add('active');
    };

    // ОНБОРДИНГ
    let step = 1;
    window.moveOb = (n) => {
        step += n;
        if(step > 2) return changeScreen('scr-auth');
        if(step < 1) step = 1;
        document.getElementById('ob-title').innerText = step === 1 ? "ПРИВЕТ В RX!" : "БЕЗОПАСНОСТЬ";
        document.getElementById('ob-icon').innerText = step === 1 ? "👋" : "🛡️";
    };

    window.openSheet = (id) => document.getElementById(id).classList.add('open');
    window.closeSheet = (id) => document.getElementById(id).classList.remove('open');
    window.setTheme = (t) => document.body.className = t === 'default' ? '' : 'theme-' + t;

    // СВАЙП ВНИЗ
    let ts = 0;
    document.querySelectorAll('.sheet').forEach(sh => {
        sh.addEventListener('touchstart', e => ts = e.touches[0].clientY);
        sh.addEventListener('touchmove', e => {
            if (e.touches[0].clientY - ts > 80) closeSheet(sh.id);
        });
    });
</script>

</body>
</html>

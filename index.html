<div id="auth-screen" style="
    height: 100vh; 
    display: flex; 
    flex-direction: column; 
    align-items: center; 
    justify-content: center; 
    padding: 30px; 
    background: var(--bg-gradient);">

    <div style="font-size: 50px; margin-bottom: 10px;">⚡</div>
    <h1 style="font-weight: 900; margin-bottom: 30px;">RX DELIVERY</h1>

    <button onclick="signInGoogle()" style="
        width: 100%; 
        padding: 15px; 
        background: #fff; 
        border: 2px solid #000; 
        border-radius: 12px; 
        font-weight: 700; 
        display: flex; 
        align-items: center; 
        justify-content: center; 
        gap: 10px;
        box-shadow: 4px 4px 0 #000;
        cursor: pointer;">
        <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" width="20">
        ВОЙТИ ЧЕРЕЗ GOOGLE
    </button>

    <div style="margin: 25px 0; color: #888; font-size: 12px;">ИЛИ ЧЕРЕЗ ПОЧТУ</div>

    <input type="email" placeholder="EMAIL" style="width: 100%; padding: 15px; border: 2px solid #eee; border-radius: 12px; margin-bottom: 10px;">
    <input type="password" placeholder="ПАРОЛЬ" style="width: 100%; padding: 15px; border: 2px solid #eee; border-radius: 12px; margin-bottom: 20px;">

    <button onclick="signInEmail()" style="
        width: 100%; 
        padding: 15px; 
        background: #000; 
        color: #fff; 
        border: none; 
        border-radius: 12px; 
        font-weight: 900;
        cursor: pointer;">
        ВОЙТИ В АККАУНТ
    </button>
</div>

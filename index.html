<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RX-Express | Доставка Реттиховка</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.1.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.0/firebase-firestore-compat.js"></script>

    <style>
        :root { --main-blue: #007bff; --dark-blue: #0056b3; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background: #f4f7f9; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        
        /* Экран загрузки */
        #loader { text-align: center; transition: opacity 0.5s; }
        .spinner { border: 4px solid rgba(0, 0, 0, 0.1); width: 36px; height: 36px; border-radius: 50%; border-left-color: var(--main-blue); animation: spin 1s linear infinite; margin: 10px auto; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Контейнер авторизации */
        #auth-ui { display: none; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 90%; max-width: 400px; text-align: center; flex-direction: column; animation: slideUp 0.6s ease-out; }
        @keyframes slideUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        h1 { color: var(--main-blue); margin-bottom: 10px; }
        p { color: #666; margin-bottom: 25px; }

        .btn { border: none; padding: 15px; border-radius: 12px; cursor: pointer; font-size: 16px; font-weight: bold; width: 100%; transition: 0.3s; margin-bottom: 10px; }
        .btn-google { background: #4285F4; color: white; }
        .btn-google:hover { background: #357ae8; }
        .btn-main { background: var(--main-blue); color: white; }
        .btn-main:hover { background: var(--dark-blue); }

        /* Окно ввода телефона */
        #phone-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); justify-content: center; align-items: center; z-index: 100; }
        .modal-content { background: white; padding: 25px; border-radius: 15px; width: 80%; max-width: 350px; text-align: center; }
        input { width: 90%; padding: 12px; margin: 15px 0; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; }
    </style>
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
        <p>Проверка доступа...</p>
    </div>

    <div id="auth-ui">
        <h1>RX-Express</h1>
        <p>Доставка заказов в Реттиховке.<br>Быстро. Надежно. Свои.</p>
        <button class="btn btn-google" onclick="loginWithGoogle()">Продолжить с Google</button>
        <button class="btn btn-main" onclick="showEmailReg()">Регистрация по почте</button>
    </div>

    <div id="phone-modal">
        <div class="modal-content">
            <h3>Нужен номер телефона</h3>
            <p>Чтобы мы могли вернуть деньги или уточнить детали заказа, введите ваш номер:</p>
            <input type="tel" id="user-phone" placeholder="+7 (900) 000-00-00">
            <button class="btn btn-main" onclick="savePhoneAndGo()">Завершить регистрацию</button>
        </div>
    </div>

    <script>
        // Твой актуальный конфиг
        const firebaseConfig = {
            apiKey: "AIzaSyBD8BzKaEBxcD-e24ypRh1qZ-iCvZZY6nQ",
            authDomain: "deliverygov11.firebaseapp.com",
            databaseURL: "https://deliverygov11-default-rtdb.firebaseio.com",
            projectId: "deliverygov11",
            storageBucket: "deliverygov11.firebasestorage.app",
            messagingSenderId: "562994407235",
            appId: "1:562994407235:web:27765b2d4916e82ec871f6",
            measurementId: "G-BKX872N1M7"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // СЛУШАТЕЛЬ СОСТОЯНИЯ
        auth.onAuthStateChanged((user) => {
            if (user) {
                checkUserPhone(user);
            } else {
                showAuthUI();
            }
        });

        function showAuthUI() {
            document.getElementById('loader').style.display = 'none';
            document.getElementById('auth-ui').style.display = 'flex';
        }

        function loginWithGoogle() {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider).catch(err => alert(err.message));
        }

        // Проверка: есть ли у пользователя телефон в базе
        async function checkUserPhone(user) {
            const userDoc = await db.collection('users').doc(user.uid).get();
            
            if (userDoc.exists && userDoc.data().phone) {
                // Все ок, телефон есть — идем на главную
                window.location.href = "main.html";
            } else {
                // Телефона нет — просим ввести
                document.getElementById('loader').style.display = 'none';
                document.getElementById('phone-modal').style.display = 'flex';
            }
        }

        // Сохранение телефона в Firestore
        async function savePhoneAndGo() {
            const phone = document.getElementById('user-phone').value;
            if (phone.length < 10) {
                alert("Введите корректный номер!");
                return;
            }

            const user = auth.currentUser;
            await db.collection('users').doc(user.uid).set({
                name: user.displayName,
                email: user.email,
                phone: phone,
                createdAt: new Date()
            }, { merge: true });

            window.location.href = "main.html";
        }

        function showEmailReg() {
            window.location.href = "register_email.html";
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RX DELIVERY | BOGDAN EDITION</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --border: 3px solid #000; --accent: #FF5733; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { margin: 0; font-family: 'Inter', sans-serif; background: #fff; overflow: hidden; }

        /* ЭКРАН РЕГИСТРАЦИИ (ТОТ САМЫЙ КРАСИВЫЙ) */
        .auth-screen {
            height: 100vh; width: 100vw; display: flex; flex-direction: column;
            align-items: center; justify-content: center; padding: 40px;
        }

        .welcome-text { font-size: 32px; font-weight: 900; text-transform: uppercase; margin-bottom: 10px; }
        
        .input-box {
            width: 300px; padding: 18px; border: var(--border);
            border-radius: 15px; margin-bottom: 15px; font-weight: bold; outline: none;
        }

        /* ОНБОРДИНГ (ЗА РУЧКУ) */
        .onboard-step {
            display: none; height: 100vh; width: 100vw;
            flex-direction: column; align-items: center; justify-content: center;
            padding: 30px; text-align: center; background: #fff;
        }

        .onboard-active { display: flex; animation: slideUp 0.5s ease; }

        @keyframes slideUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .btn-next {
            width: 280px; padding: 20px; background: #000; color: #fff;
            border: none; border-radius: 15px; font-weight: 900; text-transform: uppercase;
            cursor: pointer; position: absolute; bottom: 50px;
        }

        .btn-back {
            background: none; border: var(--border); color: #000;
            width: 60px; position: absolute; bottom: 50px; left: 20px;
        }

        /* ПРОФИЛЬ В УГЛУ */
        .profile-corner {
            position: fixed; top: 20px; right: 20px;
            width: 50px; height: 50px; border: var(--border);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            background: #FFD700; cursor: pointer; z-index: 500;
        }

        .admin-tag {
            background: red; color: white; font-size: 8px; padding: 2px 5px;
            border-radius: 5px; position: absolute; bottom: -5px;
        }
    </style>
</head>
<body>

    <div id="auth" class="auth-screen">
        <div style="font-size: 60px; margin-bottom: 20px;">📦</div>
        <div class="welcome-text">RX DELIVERY</div>
        <p style="color: #666; margin-bottom: 30px;">Реттиховка на связи</p>
        
        <input type="email" class="input-box" placeholder="Ваша почта">
        <button class="btn-next" style="position: static;" onclick="startTour()">Продолжить</button>
        
        <div style="margin-top: 20px; display: flex; align-items: center; gap: 10px; cursor: pointer;">
            <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_Color_Icon.svg" width="20">
            <b>Войти через Google</b>
        </div>
    </div>

    <div id="tour-1" class="onboard-step">
        <div style="font-size: 80px;">🏎️</div>
        <h2>БЫСТРАЯ ДОСТАВКА</h2>
        <p>Мы возим заказы по всей Реттиховке за считанные минуты.</p>
        <button class="btn-next" onclick="goStep(2)">Далее</button>
    </div>

    <div id="tour-2" class="onboard-step">
        <div style="font-size: 80px;">💎</div>
        <h2>СИСТЕМА РЕЙТИНГА</h2>
        <p>Заказывай чаще — повышай уровень. На 10 уровне доставка Ozon бесплатная!</p>
        <button class="btn-next" onclick="finishTour()">ПОЕХАЛИ!</button>
        <button class="btn-next btn-back" onclick="goStep(1)"><i class="fa-solid fa-arrow-left"></i></button>
    </div>

    <div id="main-ui" style="display: none;">
        <div class="profile-corner" onclick="alert('Меню настроек открыто')">
            <i class="fa-solid fa-user"></i>
            <div class="admin-tag">DEV</div>
        </div>
        <div style="padding: 100px 20px; text-align: center;">
            <h1>Добро пожаловать, Богдан!</h1>
            <p>Твой уровень: 25 (Максимум)</p>
            <button class="btn-next" style="position: static; background: red;" onclick="delLogic()">Удалить аккаунт</button>
        </div>
    </div>

    <script>
        function startTour() {
            document.getElementById('auth').style.display = 'none';
            goStep(1);
        }

        function goStep(n) {
            document.querySelectorAll('.onboard-step').forEach(s => s.classList.remove('onboard-active'));
            document.getElementById('tour-' + n).classList.add('onboard-active');
        }

        function finishTour() {
            document.querySelectorAll('.onboard-step').forEach(s => s.style.display = 'none');
            document.getElementById('main-ui').style.display = 'block';
        }

        function delLogic() {
            // Твоя особая защита
            const isDev = true; // Ты пометил себя как разработчик
            if (isDev) {
                alert("ОШИБКА: Аккаунт разработчика защищен от удаления. Сначала снимите флаг DEV в консоли Firebase.");
            } else {
                if(confirm("Удалить аккаунт?")) {
                    window.location.reload(); // Возврат на регистрацию
                }
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Реттиховка Экспресс — Доставка</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #000; color: #fff; }
        .slide-up { animation: slideUp 0.6s cubic-bezier(0.23, 1, 0.32, 1) forwards; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .orange-glow { box-shadow: 0 0 30px rgba(249, 115, 22, 0.2); }
        .hidden { display: none !important; }
    </style>
</head>
<body class="p-6">

    <header class="flex justify-between items-center mb-10 slide-up">
        <div>
            <h1 class="text-3xl font-black italic tracking-tighter uppercase">RX Delivery</h1>
            <p class="text-[10px] font-black text-orange-500 uppercase tracking-widest">Реттиховка • Экспресс</p>
        </div>
        <div id="user-info" class="hidden flex items-center gap-3">
            <img id="user-avatar" src="" class="w-10 h-10 rounded-xl border border-white/10">
            <button onclick="auth.signOut(); location.reload()" class="opacity-30 text-[10px] font-bold uppercase">Выйти</button>
        </div>
        <button id="login-btn" onclick="login()" class="bg-white text-black px-6 py-3 rounded-xl font-black uppercase text-[10px] tracking-widest">Войти</button>
    </header>

    <div class="grid grid-cols-1 gap-4 mb-32 slide-up" style="animation-delay: 0.1s">
        <h3 class="text-xs font-black uppercase opacity-30 tracking-widest mb-2">Меню на сегодня</h3>
        
        <div class="glass p-6 rounded-[35px] flex justify-between items-center">
            <div>
                <h4 class="text-xl font-black italic uppercase">Пицца «Реттиховская»</h4>
                <p class="text-orange-500 font-black tracking-tighter">650 ₽</p>
            </div>
            <button onclick="addToCart('Пицца Реттиховская', 650)" class="w-12 h-12 bg-white text-black rounded-2xl flex items-center justify-center text-xl font-bold">+</button>
        </div>

        <div class="glass p-6 rounded-[35px] flex justify-between items-center">
            <div>
                <h4 class="text-xl font-black italic uppercase">Доставка из OZON</h4>
                <p class="text-orange-500 font-black tracking-tighter">150 ₽</p>
            </div>
            <button onclick="addToCart('Доставка OZON', 150)" class="w-12 h-12 bg-white text-black rounded-2xl flex items-center justify-center text-xl font-bold">+</button>
        </div>
    </div>

    <div id="cart-panel" class="fixed bottom-8 left-6 right-6 glass p-8 rounded-[40px] orange-glow slide-up hidden" style="animation-delay: 0.2s">
        <div class="flex justify-between items-end mb-6">
            <div>
                <p class="text-[10px] font-black opacity-30 uppercase tracking-widest mb-1">Ваш заказ</p>
                <h2 id="cart-items-text" class="text-xl font-black italic uppercase leading-none">Корзина пуста</h2>
            </div>
            <p id="total-price" class="text-3xl font-black italic text-orange-500">0 ₽</p>
        </div>
        
        <input id="order-address" type="text" placeholder="Введите адрес в Реттиховке..." class="w-full bg-white/5 border border-white/5 rounded-2xl py-4 px-6 mb-4 text-sm font-bold outline-none focus:border-orange-500 transition-all">
        
        <button onclick="sendOrder()" class="w-full bg-orange-500 py-5 rounded-[25px] font-black uppercase text-[11px] tracking-widest shadow-lg shadow-orange-500/20 active:scale-95 transition-all">Оформить доставку</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBD8BzKaEBxcD-e24ypRh1qZ-iCvZZY6nQ",
            authDomain: "deliverygov11.firebaseapp.com",
            databaseURL: "https://deliverygov11-default-rtdb.firebaseio.com",
            projectId: "deliverygov11",
            storageBucket: "deliverygov11.firebasestorage.app",
            messagingSenderId: "562994407235",
            appId: "1:562994407235:web:dde4e7438511fa1bc871f6",
            measurementId: "G-0KDKG67YQL"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let cart = [];
        let total = 0;

        auth.onAuthStateChanged((user) => {
            if (user) {
                document.getElementById('login-btn').classList.add('hidden');
                document.getElementById('user-info').classList.remove('hidden');
                document.getElementById('user-avatar').src = user.photoURL;
            }
        });

        function login() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }

        function addToCart(name, price) {
            cart.push(name);
            total += price;
            updateCartUI();
        }

        function updateCartUI() {
            document.getElementById('cart-panel').classList.remove('hidden');
            document.getElementById('cart-items-text').innerText = cart.join(', ');
            document.getElementById('total-price').innerText = total + ' ₽';
        }

        async function sendOrder() {
            const user = auth.currentUser;
            const address = document.getElementById('order-address').value;

            if (!user) return alert("Сначала войдите в аккаунт!");
            if (address.length < 5) return alert("Введите точный адрес!");

            try {
                await db.collection("orders").add({
                    items: cart.join(', '),
                    price: total,
                    address: address,
                    customer: user.displayName,
                    email: user.email,
                    status: "new",
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                alert("Заказ принят! Богдан и курьеры уже видят его.");
                cart = []; total = 0;
                location.reload();
            } catch (e) {
                alert("Ошибка: " + e.message);
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RX Delivery — Вход</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #ffffff; height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; overflow: hidden; }
        .auth-card { background: #fff; width: 280px; padding: 20px; border-radius: 30px; border: 1px solid rgba(0,0,0,0.05); text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.02); }
        .rx-input { background: #f2f2f2; border: none; font-size: 11px; font-weight: 700; width: 100%; padding: 12px; border-radius: 12px; margin-bottom: 6px; }
        .rx-btn { background: #000; color: #fff; font-size: 9px; font-weight: 900; text-transform: uppercase; padding: 12px; border-radius: 12px; width: 100%; transition: 0.2s; margin-top: 4px; }
        .rx-btn:active { transform: scale(0.97); }
        .social-box { border: 1px solid rgba(0,0,0,0.05); padding: 8px; border-radius: 10px; flex: 1; display: flex; justify-content: center; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="auth-card">
        <div class="mb-5">
            <h1 class="text-3xl font-black italic uppercase tracking-tighter">RX</h1>
            <p class="text-[7px] font-black opacity-20 uppercase tracking-[0.3em]">Система Безопасности</p>
        </div>

        <div id="step-1">
            <input id="email" type="email" placeholder="Почта" class="rx-input">
            <div class="relative">
                <input id="password" type="password" placeholder="Пароль" class="rx-input">
                <button onclick="resetPass()" class="absolute right-3 top-3 text-[7px] font-black opacity-20 uppercase">Забыл?</button>
            </div>
            <button onclick="doLogin()" class="rx-btn">Войти</button>
            <button onclick="doRegister()" class="text-[7px] font-black opacity-10 uppercase block w-full mt-2">Регистрация</button>

            <div class="flex items-center gap-2 my-4">
                <div class="h-[1px] bg-black/5 flex-grow"></div>
                <span class="text-[6px] font-black opacity-10">ИЛИ</span>
                <div class="h-[1px] bg-black/5 flex-grow"></div>
            </div>

            <div class="flex gap-2">
                <button onclick="socialLogin('google')" class="social-box"><img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="w-4"></button>
                <button onclick="socialLogin('apple')" class="social-box"><img src="https://upload.wikimedia.org/wikipedia/commons/f/fa/Apple_logo_black.svg" class="w-3.5"></button>
            </div>
        </div>

        <div id="step-2" class="hidden">
            <p class="text-[7px] font-black opacity-30 uppercase mb-3 tracking-widest">Введите номер</p>
            <div id="recaptcha-container"></div>
            <input id="phone" type="tel" placeholder="+7 900 000 00 00" class="rx-input text-center">
            
            <div id="sms-area" class="hidden">
                <input id="code" type="number" placeholder="Код" class="rx-input text-center tracking-[0.4em]">
                <button onclick="confirmSms()" class="rx-btn bg-orange-500">Подтвердить</button>
            </div>
            <button id="send-btn" onclick="sendSms()" class="rx-btn">Получить SMS</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBD8BzKaEBxcD-e24ypRh1qZ-iCvZZY6nQ",
            authDomain: "deliverygov11.firebaseapp.com",
            projectId: "deliverygov11",
            storageBucket: "deliverygov11.firebasestorage.app",
            messagingSenderId: "562994407235",
            appId: "1:562994407235:web:dde4e7438511fa1bc871f6"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let verRes;
        window.recaptchaVerifier = new firebase.auth.RecaptchaVerifier('recaptcha-container', { 'size': 'invisible' });

        auth.onAuthStateChanged(async (user) => {
            if (user) {
                const doc = await db.collection("users").doc(user.uid).get();
                const data = doc.data();

                if (data && data.phoneVerified) {
                    // ЕСЛИ ВСЁ ОК — ПЕРЕХОДИМ НА ГЛАВНУЮ
                    window.location.href = "main.html"; 
                } else {
                    document.getElementById('step-1').classList.add('hidden');
                    document.getElementById('step-2').classList.remove('hidden');
                }
            }
        });

        function socialLogin(p) {
            let provider = p === 'google' ? new firebase.auth.GoogleAuthProvider() : new firebase.auth.OAuthProvider('apple.com');
            auth.signInWithPopup(provider).catch(err => alert("Ошибка: " + err.message));
        }

        function doLogin() {
            auth.signInWithEmailAndPassword(document.getElementById('email').value, document.getElementById('password').value)
                .catch(err => alert("Ошибка: " + err.message));
        }

        function doRegister() {
            auth.createUserWithEmailAndPassword(document.getElementById('email').value, document.getElementById('password').value)
                .catch(err => alert("Ошибка: " + err.message));
        }

        function sendSms() {
            auth.signInWithPhoneNumber(document.getElementById('phone').value, window.recaptchaVerifier).then(res => {
                verRes = res;
                document.getElementById('send-btn').classList.add('hidden');
                document.getElementById('sms-area').classList.remove('hidden');
            }).catch(err => alert(err.message));
        }

        function confirmSms() {
            verRes.confirm(document.getElementById('code').value).then(async () => {
                await db.collection("users").doc(auth.currentUser.uid).set({
                    phoneVerified: true, phone: document.getElementById('phone').value,
                    rank: 1, rating: 5, isBlocked: false
                }, { merge: true });
                window.location.href = "main.html"; // И тут тоже переход
            }).catch(() => alert("Код неверный"));
        }

        function resetPass() {
            auth.sendPasswordResetEmail(document.getElementById('email').value).then(() => alert("Проверь почту!"));
        }
    </script>
</body>
</html>

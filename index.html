<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RX Delivery — Вход</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #ffffff; color: #000; overflow: hidden; }
        .liquid-glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(25px); border: 1px solid rgba(0,0,0,0.05); }
        .slide-up { animation: slideUp 0.8s cubic-bezier(0.2, 1, 0.2, 1) forwards; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .hidden { display: none !important; }
        input { background: #f8f8f8; border: 1px solid transparent; transition: all 0.3s; }
        input:focus { background: #fff; border-color: #000; outline: none; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-6">

    <div class="fixed top-0 left-0 w-full h-full z-[-1]">
        <div class="absolute top-1/4 left-1/4 w-64 h-64 bg-orange-100 rounded-full blur-[120px]"></div>
        <div class="absolute bottom-1/4 right-1/4 w-64 h-64 bg-blue-100 rounded-full blur-[120px]"></div>
    </div>

    <div id="auth-screen" class="w-full max-w-sm slide-up">
        <div class="text-center mb-12">
            <h1 class="text-5xl font-black italic tracking-tighter uppercase">RX</h1>
            <p class="text-[10px] font-black opacity-20 uppercase tracking-[0.4em]">Express Delivery</p>
        </div>

        <div class="liquid-glass p-8 rounded-[45px] shadow-2xl space-y-4">
            <div class="space-y-3">
                <input id="email" type="email" placeholder="Электронная почта" class="w-full p-5 rounded-2xl text-sm font-bold">
                <div class="relative">
                    <input id="password" type="password" placeholder="Пароль" class="w-full p-5 rounded-2xl text-sm font-bold">
                    <button onclick="resetPassword()" class="absolute right-5 top-5 text-[9px] font-black uppercase opacity-30 hover:opacity-100 transition-all">Забыл?</button>
                </div>
                <button onclick="loginEmail()" class="w-full bg-black text-white p-5 rounded-2xl font-black uppercase text-[10px] tracking-widest active:scale-95 transition-all">Войти в систему</button>
            </div>

            <div class="flex items-center gap-4 py-2">
                <div class="h-[1px] bg-black/5 flex-grow"></div>
                <span class="text-[8px] font-black opacity-10 uppercase">или войти через</span>
                <div class="h-[1px] bg-black/5 flex-grow"></div>
            </div>

            <div class="flex gap-3">
                <button onclick="loginGoogle()" class="flex-1 flex items-center justify-center gap-2 border border-black/5 p-4 rounded-2xl hover:bg-white transition-all active:scale-90">
                    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="w-4">
                    <span class="text-[9px] font-black uppercase">Google</span>
                </button>
                <button onclick="alert('Apple ID временно недоступен')" class="flex-1 flex items-center justify-center gap-2 border border-black/5 p-4 rounded-2xl hover:bg-white transition-all active:scale-90">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/f/fa/Apple_logo_black.svg" class="w-3.5 mb-0.5">
                    <span class="text-[9px] font-black uppercase">Apple ID</span>
                </button>
            </div>

            <button onclick="registerEmail()" class="w-full text-center text-[9px] font-black opacity-20 uppercase mt-4 hover:opacity-100 transition-all tracking-widest">Создать новый аккаунт</button>
        </div>
    </div>

    <div id="main-window" class="hidden w-full max-w-4xl slide-up">
        <div class="liquid-glass p-10 rounded-[50px] text-center">
            <h2 class="text-3xl font-black italic uppercase mb-4">Добро пожаловать</h2>
            <p id="user-display" class="text-xs opacity-50 mb-8"></p>
            <button onclick="auth.signOut(); location.reload()" class="bg-black text-white px-10 py-4 rounded-2xl font-black uppercase text-[10px]">Выйти</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBD8BzKaEBxcD-e24ypRh1qZ-iCvZZY6nQ",
            authDomain: "deliverygov11.firebaseapp.com",
            projectId: "deliverygov11",
            storageBucket: "deliverygov11.firebasestorage.app",
            messagingSenderId: "562994407235",
            appId: "1:562994407235:web:dde4e7438511fa1bc871f6"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        // СЛУШАЕМ СОСТОЯНИЕ
        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('main-window').classList.remove('hidden');
                document.getElementById('user-display').innerText = user.email || user.displayName;
            }
        });

        // ЛОГИКА ВХОДА
        function loginGoogle() {
            const provider = new firebase.auth.GoogleAuthProvider();
            // Используем popup, но если не сработает — redirect
            auth.signInWithPopup(provider).catch(() => auth.signInWithRedirect(provider));
        }

        function loginEmail() {
            const e = document.getElementById('email').value;
            const p = document.getElementById('password').value;
            if(!e || !p) return alert("Заполни все поля!");
            auth.signInWithEmailAndPassword(e, p).catch(err => alert("Ошибка: " + err.message));
        }

        function registerEmail() {
            const e = document.getElementById('email').value;
            const p = document.getElementById('password').value;
            if(p.length < 6) return alert("Пароль должен быть от 6 символов!");
            auth.createUserWithEmailAndPassword(e, p).then(() => alert("Успех! Теперь нажми Войти.")).catch(err => alert(err.message));
        }

        function resetPassword() {
            const e = document.getElementById('email').value;
            if(!e) return alert("Введи почту в поле выше, чтобы я знала, куда отправить код!");
            auth.sendPasswordResetEmail(e).then(() => alert("Письмо для смены пароля отправлено!")).catch(err => alert(err.message));
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RX DELIVERY | CLIENT SIDE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --border: 3px solid #000; --accent: #FF5733; --shadow: 6px 6px 0px #000; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; font-family: 'Inter', sans-serif; background: #fff; overflow: hidden; height: 100vh; }

        /* ВХОД */
        #auth-page { height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #fff; z-index: 2000; position: relative; }
        .google-btn {
            display: flex; align-items: center; gap: 15px; padding: 20px 30px;
            border: var(--border); border-radius: 20px; background: #fff;
            font-weight: 900; cursor: pointer; box-shadow: var(--shadow); transition: 0.1s;
        }
        .google-btn:active { transform: translate(3px, 3px); box-shadow: none; }

        /* ГЛАВНЫЙ ЭКРАН */
        #main-app { display: none; height: 100vh; flex-direction: column; }
        .header { padding: 15px 25px; border-bottom: var(--border); display: flex; justify-content: space-between; align-items: center; background: #fff; }
        .status-pill { background: #000; color: #fff; padding: 5px 12px; border-radius: 20px; font-size: 10px; font-weight: 900; }

        .hero { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .welcome-msg { font-size: 14px; font-weight: bold; color: #888; margin: 0; }
        .user-name { font-size: 35px; font-weight: 900; color: var(--accent); text-transform: uppercase; margin-bottom: 40px; }

        /* ВЫЕЗЖАЮЩЕЕ МЕНЮ (КАТЕГОРИИ) */
        #cat-menu {
            position: fixed; bottom: -110%; left: 0; width: 100%; height: 85%;
            background: #fff; border-top: var(--border); z-index: 3000;
            transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 25px; display: flex; flex-direction: column;
        }
        .menu-open { bottom: 0 !important; }
        .drag-handle { width: 60px; height: 6px; background: #eee; border-radius: 10px; align-self: center; margin-bottom: 30px; cursor: pointer; border: 1px solid #000; }

        .cat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .cat-card {
            border: var(--border); border-radius: 20px; padding: 25px;
            text-align: center; font-weight: 900; font-size: 16px; cursor: pointer;
            box-shadow: 4px 4px 0px #000;
        }

        /* ИНСПЕКТОР (ДУРОВ СТАЙЛ) */
        #inspector { position: fixed; top: 10px; left: 10px; font-size: 9px; font-family: monospace; color: #0f0; background: rgba(0,0,0,0.7); padding: 5px; border-radius: 5px; display: none; z-index: 5000; }
    </style>
</head>
<body>

    <div id="inspector">SESSION_START: <span id="sess-id">...</span></div>

    <section id="auth-page">
        <h1 style="font-size: 50px; font-weight: 900; margin: 0;">RX <span style="color: var(--accent);">DELIVERY</span></h1>
        <p style="margin-bottom: 50px; font-weight: bold;">РЕТТИХОВКА | 2026</p>
        <div class="google-btn" onclick="handleAuth()">
            <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_Color_Icon.svg" width="24">
            <span>ПРОДОЛЖИТЬ С GOOGLE</span>
        </div>
    </section>

    <div id="main-app">
        <header class="header">
            <div id="greeting-txt" style="font-weight: 900; font-size: 14px;">ПРИВЕТ!</div>
            <div class="status-pill">RX-ID: <span id="display-id">...</span></div>
        </header>

        <main class="hero">
            <p class="welcome-msg">ДОБРО ПОЖАЛОВАТЬ,</p>
            <div id="user-display" class="user-name">DEVELOPER</div>
            
            <button class="google-btn" style="width: 320px; background: var(--accent); color: white;" onclick="setMenu(true)">
                ЗАКАЗАТЬ ДОСТАВКУ <i class="fa-solid fa-chevron-up" style="margin-left: 10px;"></i>
            </button>
            <button class="google-btn" style="width: 320px; background: #005BFF; color: white; margin-top: 15px;">
                ЗАБРАТЬ OZON <i class="fa-solid fa-box-open" style="margin-left: 10px;"></i>
            </button>
        </main>

        <div style="padding: 20px; text-align: center; font-size: 10px; color: #ccc;" onclick="toggleInspector()">
            v.1.2.0-STABLE | ADMIN CONTROL READY
        </div>
    </div>

    <div id="cat-menu">
        <div class="drag-handle" onclick="setMenu(false)"></div>
        <h2 style="text-align: center; font-weight: 900; margin-bottom: 30px;">ЧТО ВЕЗЁМ?</h2>
        <div class="cat-grid">
            <div class="cat-card" style="background: #FFE4E1;">СНЕКИ 🍿</div>
            <div class="cat-card" style="background: #E0FFFF;">ВОДА 🥤</div>
            <div class="cat-card" style="background: #FFFACD;">СЛАДКОЕ 🍫</div>
            <div class="cat-card" style="background: #F0FFF0;">ВЫПЕЧКА 🥐</div>
        </div>
        <button class="google-btn" style="margin-top: auto; width: 100%; box-shadow: none;" onclick="setMenu(false)">НАЗАД</button>
    </div>

    <script>
        let clicks = 0;

        function handleAuth() {
            // Имитируем реальный ответ от Firebase/Google
            const googleUser = {
                name: "Богдан",
                uid: "RX-" + Math.floor(Math.random()*90000 + 10000)
            };
            
            completeLogin(googleUser);
        }

        function completeLogin(user) {
            const now = new Date().getTime();
            const lastVisit = localStorage.getItem('rx_last_visit');
            const dayInMs = 24 * 60 * 60 * 1000;

            // Логика как в Сбере
            if (lastVisit && (now - lastVisit > dayInMs)) {
                document.getElementById('greeting-txt').innerText = "ДАВНО НЕ ВИДЕЛИСЬ!";
            } else {
                document.getElementById('greeting-txt').innerText = "ПРИВЕТ!";
            }

            localStorage.setItem('rx_last_visit', now);
            localStorage.setItem('rx_user', user.name);
            localStorage.setItem('rx_uid', user.uid);

            document.getElementById('user-display').innerText = user.name;
            document.getElementById('display-id').innerText = user.uid;
            document.getElementById('sess-id').innerText = user.uid;
            
            document.getElementById('auth-page').style.display = 'none';
            document.getElementById('main-app').style.display = 'flex';
        }

        function setMenu(show) {
            document.getElementById('cat-menu').classList.toggle('menu-open', show);
        }

        function toggleInspector() {
            clicks++;
            if(clicks >= 5) document.getElementById('inspector').style.display = 'block';
        }

        // Авто-вход
        window.onload = () => {
            const saved = localStorage.getItem('rx_user');
            if(saved) completeLogin({name: saved, uid: localStorage.getItem('rx_uid')});
        }
    </script>
</body>
</html>

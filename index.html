    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // Твои правильные ключи от Supabase
        const SUPABASE_URL = "https://gnzjxjgwawgfoemunpjt.supabase.co";
        const SUPABASE_ANON_KEY = "Sb_publishable_ytZSEfwJBwFWwGn1CLB4ww_mDxmVbCW"; 
        
        // Создаем подключение
        const supabase = window.supabase ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY) : null;

        const slides = document.querySelectorAll('.slide');
        const dots = document.querySelectorAll('#dots span');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');
        let currentSlide = 0;

        // Внутреннее состояние корзины
        let itemPrice = 45;
        let itemCount = 1;
        let userPhone = ""; 

        function updateSlider() {
            slides.forEach((slide, index) => {
                slide.classList.toggle('active', index === currentSlide);
            });

            dots.forEach((dot, index) => {
                dot.className = index === currentSlide 
                    ? "h-2 w-2 rounded-full bg-blue-600 transition-all duration-300" 
                    : "h-2 w-2 rounded-full bg-gray-300 transition-all duration-300";
            });

            if (currentSlide === 0) {
                prevBtn.disabled = true;
                prevBtn.className = "px-4 py-2 text-sm font-medium text-gray-400 cursor-not-allowed";
            } else {
                prevBtn.disabled = false;
                prevBtn.className = "px-4 py-2 text-sm font-medium text-blue-600 hover:text-blue-800 cursor-pointer";
            }

            // ВАЖНО: Мы просто запускаем проверку базы данных в фоновом режиме, 
            // она больше НЕ блокирует переключение слайдов, даже если упадет с ошибкой!
            syncSlideWithSupabase(currentSlide).catch(err => console.log("Фоновая ошибка базы данных убрана:", err));
        }

        nextBtn.addEventListener('click', () => {
            if (currentSlide < slides.length - 1) {
                currentSlide++;
                updateSlider();
            } else {
                switchToAuthCard(); 
            }
        });

        prevBtn.addEventListener('click', () => {
            if (currentSlide > 0) {
                currentSlide--;
                updateSlider();
            }
        });

        // Работа с кнопками Слайда 3 (Магазины)
        document.getElementById('order-food-btn').addEventListener('click', () => {
            document.getElementById('shops-list').classList.toggle('hidden');
        });

        document.getElementById('shop-dezhurny').addEventListener('click', () => {
            document.getElementById('shops-list').classList.add('hidden');
            document.getElementById('catalog-box').classList.remove('hidden');
        });

        const addToCartMock = document.getElementById('add-to-cart-mock');
        const headerCartIcon = document.getElementById('header-cart-icon');
        addToCartMock.addEventListener('click', () => {
            headerCartIcon.classList.remove('opacity-20');
            headerCartIcon.classList.add('opacity-100', 'text-green-600', 'scale-125');
            addToCartMock.innerText = "✓ В корзине";
            addToCartMock.disabled = true;
            document.getElementById('slide3-tip').classList.remove('hidden');
            setTimeout(() => headerCartIcon.classList.remove('scale-125'), 300);
        });

        // Управление в Слайде 4 (Корзина и телефон)
        const cartCountEl = document.getElementById('cart-count');
        const cartTotalEl = document.getElementById('cart-total');
        const mockPhone = document.getElementById('mock-phone');
        const mockPayBtn = document.getElementById('mock-pay-btn');

        function updateCartUI() {
            cartCountEl.innerText = itemCount;
            cartTotalEl.innerText = `${itemCount * itemPrice} ₽`;
            document.getElementById('unitpay-item-name').innerText = `Хлеб (${itemCount} шт.)`;
            document.getElementById('unitpay-total').innerText = `${itemCount * itemPrice} ₽`;
        }

        document.getElementById('cart-plus').addEventListener('click', () => {
            itemCount++;
            updateCartUI();
        });

        document.getElementById('cart-minus').addEventListener('click', () => {
            if (itemCount > 1) {
                itemCount--;
                updateCartUI();
            }
        });

        // Валидация телефона (Зелёный цвет при >= 10 цифр)
        mockPhone.addEventListener('input', () => {
            userPhone = mockPhone.value.trim();
            if (userPhone.length >= 10) {
                mockPayBtn.disabled = false;
                mockPayBtn.className = "w-full bg-green-600 text-white py-2.5 rounded-lg text-sm font-bold shadow hover:bg-green-700 cursor-pointer transition-colors duration-300";
            } else {
                mockPayBtn.disabled = true;
                mockPayBtn.className = "w-full bg-red-600 text-white py-2.5 rounded-lg text-sm font-bold shadow opacity-60 cursor-not-allowed transition-colors duration-300";
            }
        });

        mockPayBtn.addEventListener('click', () => {
            document.getElementById('unitpay-modal').classList.remove('hidden');
        });

        document.getElementById('close-unitpay').addEventListener('click', () => {
            document.getElementById('unitpay-modal').classList.add('hidden');
            currentSlide++; 
            updateSlider();
        });

        // ПЕРЕХОД К ОКНУ АВТОРИЗАЦИИ С ПРОВЕРКОЙ ТЕМЫ БРАУЗЕРА
        function switchToAuthCard() {
            const onboardingCard = document.getElementById('onboarding-card');
            const authCard = document.getElementById('auth-card');
            const bodyBg = document.getElementById('body-bg');

            const isDarkMode = window.matchMedia('(prefers-color-scheme: dark)').matches;
            
            if (isDarkMode) {
                authCard.classList.add('bg-slate-900'); 
                bodyBg.className = "bg-slate-950 min-h-screen flex items-center justify-center p-4 transition-colors duration-500";
            } else {
                authCard.classList.add('bg-orange-600'); 
                bodyBg.className = "bg-orange-50 min-h-screen flex items-center justify-center p-4 transition-colors duration-500";
            }

            onboardingCard.classList.add('fade-out');
            
            setTimeout(() => {
                onboardingCard.classList.add('hidden');
                authCard.classList.remove('hidden');
                setTimeout(() => {
                    authCard.classList.remove('opacity-0', 'translate-y-4');
                    authCard.classList.add('opacity-100', 'translate-y-0');
                }, 50);
            }, 500);
        }

        // ВАЛИДАЦИЯ ФОРМЫ РЕГИСТРАЦИИ ПОЧТА + ПАРОЛЬ
        const authEmail = document.getElementById('auth-email');
        const authPassword = document.getElementById('auth-password');
        const authSubmitBtn = document.getElementById('auth-submit-btn');

        function validateAuthForm() {
            const emailVal = authEmail.value.trim();
            const passVal = authPassword.value.trim();

            if (emailVal.includes('@') && passVal.length >= 6) {
                authSubmitBtn.disabled = false;
                authSubmitBtn.className = "w-full bg-green-600 text-white py-3 rounded-xl font-bold text-sm shadow-md transition-colors duration-300 hover:bg-green-700 cursor-pointer";
            } else {
                authSubmitBtn.disabled = true;
                authSubmitBtn.className = "w-full bg-red-600 text-white py-3 rounded-xl font-bold text-sm shadow-md transition-colors duration-300 cursor-not-allowed";
            }
        }

        authEmail.addEventListener('input', validateAuthForm);
        authPassword.addEventListener('input', validateAuthForm);


        // ========================================================
        // 🔥 БЕЗОПАСНАЯ ИНТЕГРАЦИЯ С API SUPABASE
        // ========================================================

        // Создание аккаунта Почта + Пароль
        authSubmitBtn.addEventListener('click', async () => {
            if (!supabase) return;
            const email = authEmail.value.trim();
            const password = authPassword.value.trim();

            try {
                const { data, error } = await supabase.auth.signUp({ email, password });
                if (error) {
                    alert("Ошибка регистрации: " + error.message);
                } else {
                    alert("Успешно зарегистрировано! Письмо подтверждения отправлено.");
                    if (userPhone && data.user) {
                        await supabase.from('profiles').insert([
                            { id: data.user.id, phone: userPhone, email: email }
                        ]);
                    }
                }
            } catch (e) { alert("Ошибка соединения с Supabase"); }
        });

        // Авторизация через Яндекс ID
        document.getElementById('yandex-auth-btn').addEventListener('click', async () => {
            if (!supabase) return;
            try {
                await supabase.auth.signInWithOAuth({
                    provider: 'yandex',
                    options: { redirectTo: window.location.origin }
                });
            } catch (e) { console.log(e); }
        });

        // Функция синхронизации данных (Ошибки внутри неё больше не вешают сайт!)
        async function syncSlideWithSupabase(slideIdx) {
            if (!supabase) return;

            // На экране 2 тянем статус заказа
            if (slideIdx === 1) {
                try {
                    const { data: orders, error } = await supabase
                        .from('orders') 
                        .select('status')
                        .order('created_at', { ascending: false })
                        .limit(1);

                    if (!error && orders && orders.length > 0) {
                        document.getElementById('status-box').innerText = `Статус заказа: ${orders[0].status}`;
                    }
                } catch (e) { console.log("Таблицы orders пока нет, используем дефолт."); }
            }

            // На экране 3 подгружаем свежий ценник хлеба
            if (slideIdx === 2) {
                try {
                    const { data: products, error } = await supabase
                        .from('products') 
                        .select('title, image_url, price')
                        .eq('title', 'Хлеб')
                        .single();

                    if (!error && products) {
                        itemPrice = products.price;
                        document.getElementById('product-title-slot').innerText = products.title;
                        document.getElementById('product-price-slot').innerText = `${products.price} ₽`;
                        if (products.image_url) {
                            document.getElementById('product-img-slot').innerHTML = `<img src="${products.image_url}" class="w-8 h-8 object-cover rounded-lg" />`;
                        }
                        updateCartUI();
                    }
                } catch (e) { console.log("Таблицы products пока нет, используем дефолт."); }
            }
        }

        // Запуск стартового слайда
        updateSlider();
    </script>

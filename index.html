<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RX Delivery - Доставка в Реттиховке</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --main-color: #ffcc00;
            --bg-color: #f4f4f4;
            --text-color: #333;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background: var(--bg-color); color: var(--text-color); }
        header { background: #fff; padding: 15px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); position: sticky; top: 0; z-index: 100; }
        .container { padding: 20px; max-width: 600px; margin: auto; }
        
        /* Карточки товаров */
        .product-card { background: #fff; border-radius: 15px; padding: 15px; margin-bottom: 15px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .product-info h3 { margin: 0; font-size: 18px; }
        .product-info p { margin: 5px 0; color: #777; }
        .btn-add { background: var(--main-color); border: none; padding: 10px 15px; border-radius: 10px; cursor: pointer; font-weight: bold; }

        /* Плавающие окна (Sheet) */
        .sheet { position: fixed; bottom: -100%; left: 0; width: 100%; background: #fff; border-radius: 25px 25px 0 0; transition: 0.4s; z-index: 1000; box-shadow: 0 -5px 15px rgba(0,0,0,0.1); padding: 20px; box-sizing: border-box; }
        .sheet.active { bottom: 0; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; z-index: 999; }
        .overlay.active { display: block; }

        .btn-main { width: 100%; padding: 15px; border: none; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-pay { background: #000; color: #fff; }
        
        .cart-btn { position: fixed; bottom: 20px; right: 20px; background: var(--main-color); width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); cursor: pointer; z-index: 98; }
    </style>
</head>
<body>

<header>
    <h2 style="margin:0;">🚀 RX DELIVERY</h2>
    <small>Доставка в пос. Реттиховка</small>
</header>

<div class="container">
    <div id="products-list">
        <div class="product-card">
            <div class="product-info">
                <h3>Картошка фри</h3>
                <p>110 ₽</p>
            </div>
            <button class="btn-add" onclick="addToCart('Картошка фри', 110)">+</button>
        </div>
        
        <div class="product-card">
            <div class="product-info">
                <h3>Кофе (Американо)</h3>
                <p>90 ₽</p>
            </div>
            <button class="btn-add" onclick="addToCart('Кофе', 90)">+</button>
        </div>
    </div>
</div>

<div class="cart-btn" onclick="openSheet('cart-sheet')">
    <i class="fa-solid fa-basket-shopping"></i>
</div>

<div id="overlay" class="overlay" onclick="closeAll()"></div>

<div id="cart-sheet" class="sheet">
    <h3>🛒 Ваша корзина</h3>
    <div id="cart-items"></div>
    <hr>
    <div style="display:flex; justify-content:space-between; font-weight:bold;">
        <span>Итого:</span>
        <span id="cart-total">0 ₽</span>
    </div>
    <button class="btn-main" style="background: var(--main-color);" onclick="openSheet('pay-sheet')">Оформить заказ</button>
    <button class="btn-main" onclick="closeSheet('cart-sheet')">Закрыть</button>
</div>

<div id="pay-sheet" class="sheet">
    <h3 style="text-align:center;">ВЫБЕРИТЕ СПОСОБ ОПЛАТЫ</h3>
    <p style="text-align:center; color:#666;">Заказ будет передан курьеру после оплаты</p>
    
    <button class="btn-main btn-pay" onclick="handleSBP()">
        <i class="fa-solid fa-qrcode"></i> ОПЛАТИТЬ ЧЕРЕЗ СБП (110 ₽)
    </button>
    
    <button class="btn-main" style="background:#eee;" onclick="closeSheet('pay-sheet')">НАЗАД</button>
</div>

<script>
    let cart = [];

    // Добавление в корзину
    function addToCart(name, price) {
        cart.push({ name, price });
        updateCartUI();
        alert(name + " добавлен в корзину!");
    }

    // Обновление интерфейса корзины
    function updateCartUI() {
        const itemsDiv = document.getElementById('cart-items');
        const totalSpan = document.getElementById('cart-total');
        itemsDiv.innerHTML = '';
        let total = 0;

        cart.forEach((item, index) => {
            total += item.price;
            itemsDiv.innerHTML += `<div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                <span>${item.name}</span>
                <span>${item.price} ₽</span>
            </div>`;
        });

        totalSpan.innerText = total + " ₽";
    }

    // Управление окнами
    function openSheet(id) {
        document.getElementById('overlay').classList.add('active');
        document.getElementById(id).classList.add('active');
    }

    function closeSheet(id) {
        document.getElementById(id).classList.remove('active');
        if (id === 'cart-sheet' || id === 'pay-sheet') {
            document.getElementById('overlay').classList.remove('active');
        }
    }

    function closeAll() {
        document.querySelectorAll('.sheet').forEach(s => s.classList.remove('active'));
        document.getElementById('overlay').classList.remove('active');
    }

    // ГЛАВНАЯ ФУНКЦИЯ ОПЛАТЫ
    window.handleSBP = () => {
        const sbpLink = "https://c2c.cbrpay.ru/AS1I003EI3T7RIPG9018PF66SR2FTN0V";
        
        // Тут можно добавить сохранение в Firebase перед оплатой
        console.log("Заказ отправлен в обработку...");

        // Переход к оплате
        window.location.href = sbpLink;

        // Очистка после перехода
        cart = [];
        updateCartUI();
        closeAll();
    };
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RX DELIVERY | PRO ВЕРСИЯ</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --accent: #ff8233;
            --bg: #fffcf9;
            --border: 3px solid #000;
            --shadow: 5px 5px 0px #000;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Inter', sans-serif; }
        body { margin: 0; background: var(--bg); overflow: hidden; }

        .app-frame { width: 100%; max-width: 500px; height: 100vh; margin: 0 auto; position: relative; border-left: var(--border); border-right: var(--border); background: var(--bg); display: flex; flex-direction: column; }

        /* ЭКРАНЫ */
        .screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; flex-direction: column; background: var(--bg); z-index: 10; }
        .screen.active { display: flex; }

        header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; background: #fff; border-bottom: var(--border); }
        .btn-icon { width: 45px; height: 45px; background: #fff; border: var(--border); border-radius: 12px; display: flex; align-items: center; justify-content: center; box-shadow: 3px 3px 0 #000; cursor: pointer; }

        /* ПРОФИЛЬ (ПЛАШКИ) */
        .profile-list { padding: 20px; display: flex; flex-direction: column; gap: 12px; overflow-y: auto; }
        .p-item { background: #fff; border: var(--border); padding: 18px; border-radius: 18px; display: flex; align-items: center; gap: 15px; font-weight: 800; box-shadow: 4px 4px 0 var(--accent); cursor: pointer; }
        .p-item i { color: var(--accent); font-size: 20px; width: 25px; }

        /* КОРЗИНА */
        .cart-body { padding: 20px; overflow-y: auto; flex: 1; }
        .cart-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 2px dashed #ddd; font-weight: 700; }
        .input-group { margin-top: 20px; }
        .input-group label { display: block; font-weight: 900; margin-bottom: 5px; font-size: 14px; }
        .rx-input { width: 100%; padding: 12px; border: var(--border); border-radius: 12px; margin-bottom: 15px; font-weight: 600; }

        /* ЧЕК */
        .receipt { background: #eee; padding: 15px; border-radius: 15px; border: 2px solid #000; margin-top: 10px; }
        .receipt-row { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 14px; }
        .receipt-total { border-top: 2px solid #000; padding-top: 5px; font-weight: 900; font-size: 18px; }

        /* BOTTOM SHEETS */
        .sheet { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%) translateY(100%); width: 100%; max-width: 500px; background: #fff; border-top: var(--border); border-radius: 30px 30px 0 0; z-index: 1000; transition: 0.4s; padding: 20px; box-shadow: 0 -10px 20px rgba(0,0,0,0.1); }
        .sheet.open { transform: translateX(-50%) translateY(0); }

        .btn-pay { width: 100%; padding: 15px; border: var(--border); border-radius: 12px; font-weight: 900; cursor: pointer; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; gap: 10px; box-shadow: var(--shadow); }
    </style>
</head>
<body>

<div class="app-frame">

    <div id="scr-home" class="screen active">
        <header>
            <div class="btn-icon" onclick="switchScreen('scr-profile')"><i class="fa-solid fa-user"></i></div>
            <b style="font-size:20px; letter-spacing:-1px;">RX DELIVERY</b>
            <div class="btn-icon" onclick="switchScreen('scr-cart')"><i class="fa-solid fa-basket-shopping"></i></div>
        </header>
        <div style="flex:1; display:flex; flex-direction:column; justify-content:center; padding:20px; gap:15px;">
            <button class="btn-pay" style="background:var(--accent); padding:45px;" onclick="switchScreen('scr-shop')">ЗАКАЗАТЬ ЕДУ <i class="fa-solid fa-pizza-slice"></i></button>
            <button class="btn-pay" style="background:#4d88ff; color:#fff; padding:45px;" onclick="switchScreen('scr-ozon')">OZON ШТРИХ-КОД <i class="fa-solid fa-barcode"></i></button>
        </div>
    </div>

    <div id="scr-profile" class="screen">
        <header>
            <div class="btn-icon" onclick="switchScreen('scr-home')"><i class="fa-solid fa-arrow-left"></i></div>
            <b>МОЙ ПРОФИЛЬ</b>
            <div></div>
        </header>
        <div class="profile-list">
            <div class="p-item"><i class="fa-solid fa-clock-rotate-left"></i> Мои заказы</div>
            <div class="p-item"><i class="fa-solid fa-address-card"></i> Мои данные</div>
            <div class="p-item"><i class="fa-solid fa-map-location-dot"></i> Мой адрес</div>
            <div class="p-item"><i class="fa-solid fa-store"></i> Магазин: <span style="color:#000; margin-left:auto;">Алина</span></div>
            <div class="p-item"><i class="fa-solid fa-palette"></i> Тема: <span style="color:#000; margin-left:auto;">Оранжевая</span></div>
        </div>
    </div>

    <div id="scr-shop" class="screen">
        <header>
            <div class="btn-icon" onclick="switchScreen('scr-home')"><i class="fa-solid fa-arrow-left"></i></div>
            <b>МАГАЗИН</b>
            <div class="btn-icon" onclick="switchScreen('scr-cart')"><i class="fa-solid fa-basket-shopping"></i></div>
        </header>
        <div style="padding:20px; text-align:center;">
            <div style="background:#fff; border:var(--border); padding:15px; border-radius:20px; box-shadow:4px 4px 0 #000;">
                <div style="font-size:40px;">☕</div>
                <b>Золотой Дедушка</b><br>60 ₽
                <button class="btn-pay" style="margin-top:10px; padding:10px;" onclick="alert('Добавлено в корзину!')">В КОРЗИНУ</button>
            </div>
        </div>
    </div>

    <div id="scr-cart" class="screen">
        <header>
            <div class="btn-icon" onclick="switchScreen('scr-home')"><i class="fa-solid fa-arrow-left"></i></div>
            <b>КОРЗИНА</b>
            <div></div>
        </header>
        <div class="cart-body">
            <h3>Твои товары:</h3>
            <div class="cart-item"><span>Золотой Дедушка x1</span> <span>60 ₽</span></div>
            
            <div class="input-group">
                <label>АДРЕС ДОСТАВКИ (Реттиховка)</label>
                <input type="text" class="rx-input" placeholder="Улица, дом, квартира">
                
                <label>ПРОМОКОД</label>
                <input type="text" class="rx-input" placeholder="Введите код...">
            </div>

            <div class="receipt">
                <div class="receipt-row"><span>Товары:</span> <span>60 ₽</span></div>
                <div class="receipt-row"><span>Доставка:</span> <span>50 ₽</span></div>
                <div class="receipt-row receipt-total"><span>ИТОГО:</span> <span>110 ₽</span></div>
            </div>
            
            <button class="btn-pay" style="background:#00ff00; margin-top:20px;" onclick="openSheet('sheet-payment')">ОФОРМИТЬ ЗАКАЗ</button>
        </div>
    </div>

    <div id="sheet-payment" class="sheet">
        <h3 style="text-align:center;">ВЫБЕРИТЕ СПОСОБ ОПЛАТЫ</h3>
        <button class="btn-pay" style="background:#fff;" onclick="window.location.href='https://qr.nspk.ru/...'"><img src="https://upload.wikimedia.org/wikipedia/commons/b/bb/Logo_of_the_System_of_Fast_Payments.svg" width="40"> СБП</button>
        <button class="btn-pay" style="background:#ef4444; color:#fff;" onclick="window.location.href='https://alfabank.ru/payment/'">АЛЬФА-БАНК</button>
        <button class="btn-pay" style="background:#000; color:#fff;" onclick="closeSheet('sheet-payment')">НАЗАД</button>
    </div>

</div>

<script>
    function switchScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        closeSheet('sheet-payment');
    }

    function openSheet(id) { document.getElementById(id).classList.add('open'); }
    function closeSheet(id) { document.getElementById(id).classList.remove('open'); }
</script>

</body>
</html>

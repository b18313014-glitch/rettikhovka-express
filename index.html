<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RX - Реттиховка Экспресс</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        :root { --bg: #ffffff; --text: #000000; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); transition: 0.3s; overflow-x: hidden; }
        
        .slide-up { transform: translateY(100%); transition: transform 0.5s cubic-bezier(0.32, 0.72, 0, 1); }
        .slide-up.active { transform: translateY(0); }
        
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }
        .error-shake { animation: shake 0.4s ease-in-out; border-color: #ff4b4b !important; }

        @keyframes digit-bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); color: #22c55e; } }
        .success-bounce { animation: digit-bounce 0.6s ease-in-out; }
    </style>
</head>
<body>

    <div id="app-interface">
        <header class="p-6 flex justify-between items-center sticky top-0 bg-white/80 backdrop-blur-md z-40">
            <div class="font-black italic text-2xl tracking-tighter">RX</div>
            <div class="flex gap-4">
                <button onclick="openCart()" class="text-2xl">🛒</button>
                <button onclick="openProfile()" class="w-10 h-10 rounded-full bg-zinc-100 overflow-hidden border border-zinc-200">
                    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Bogdan" alt="Ava">
                </button>
            </div>
        </header>

        <main class="p-6">
            <div class="mb-8">
                <h2 class="text-xs font-black opacity-30 uppercase tracking-[0.3em]">Ваш регион</h2>
                <p class="font-bold">пос. Реттиховка</p>
            </div>

            <div class="space-y-4">
                <div onclick="addToCart('Заказ из магазина', 500)" class="h-44 bg-black text-white rounded-[35px] p-8 flex flex-col justify-end active:scale-95 transition-all cursor-pointer">
                    <p class="text-3xl font-black italic">🍕 ЕДА</p>
                    <p class="text-[10px] opacity-50 uppercase font-bold">Доставка по поселку</p>
                </div>
                <div onclick="alert('Скоро добавим забор из ОЗОН в Черниговке!')" class="h-44 bg-zinc-100 rounded-[35px] p-8 flex flex-col justify-end border border-zinc-200 active:scale-95 transition-all cursor-pointer">
                    <p class="text-3xl font-black italic text-black">📦 ОЗОН</p>
                    <p class="text-[10px] text-zinc-500 uppercase font-bold">Привезем ваш заказ</p>
                </div>
            </div>
        </main>
    </div>

    <div id="modal-profile" class="slide-up fixed inset-0 bg-white z-[70] p-8">
        <div class="flex justify-between items-center mb-12">
            <h2 class="text-3xl font-black italic tracking-tighter">ПРОФИЛЬ</h2>
            <button onclick="closeModals()" class="text-4xl">×</button>
        </div>
        
        <div class="space-y-8">
            <div class="flex items-center gap-4 bg-zinc-50 p-6 rounded-[30px]">
                <div class="w-16 h-16 rounded-full bg-zinc-200 overflow-hidden">
                    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Bogdan" alt="Ava">
                </div>
                <div>
                    <p class="font-black text-xl italic">Богдан</p>
                    <p class="text-[10px] font-bold text-orange-500 uppercase">пос. Реттиховка</p>
                    <p class="text-[10px] opacity-40 uppercase">Приморский край</p>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-2">
                <button onclick="setTheme('light')" class="p-4 bg-white border border-zinc-200 rounded-2xl text-[10px] font-black">СВЕТЛАЯ</button>
                <button onclick="setTheme('dark')" class="p-4 bg-zinc-800 text-white rounded-2xl text-[10px] font-black">ТЕМНАЯ</button>
                <button onclick="setTheme('black')" class="p-4 bg-black text-white rounded-2xl text-[10px] font-black">ЧЕРНАЯ (OLED)</button>
                <button onclick="setTheme('orange')" class="p-4 bg-orange-500 text-white rounded-2xl text-[10px] font-black">ОРАНЖЕВАЯ</button>
            </div>
            
            <button onclick="confirm('Удалить аккаунт?')" class="w-full text-red-500 font-bold text-xs p-4">Удалить аккаунт</button>
        </div>
    </div>

    <div id="modal-cart" class="slide-up fixed inset-0 bg-white z-[60] p-8 flex flex-col">
        <div class="flex justify-between items-center mb-8">
            <h2 class="text-3xl font-black italic tracking-tighter">КОРЗИНА</h2>
            <button onclick="closeModals()" class="text-4xl">×</button>
        </div>
        
        <div id="cart-list" class="flex-grow space-y-4 overflow-y-auto mb-6"></div>

        <div class="space-y-6">
            <div class="p-4 bg-orange-50 rounded-2xl border border-orange-100">
                <p class="text-[10px] font-black text-orange-600 uppercase mb-1">Зона доставки</p>
                <p class="text-xs font-bold text-orange-900">Только в пределах Реттиховки!</p>
            </div>

            <div>
                <p class="text-[10px] font-black opacity-30 mb-2 uppercase">Улица и номер дома</p>
                <input id="addr-input" type="text" placeholder="Пример: ул. Центральная, 5" class="w-full bg-zinc-50 p-5 rounded-[25px] outline-none font-bold text-sm border border-zinc-100 focus:border-black transition-all">
            </div>

            <div class="flex justify-between items-end mb-2">
                <p class="text-[10px] opacity-40 font-bold uppercase">Сумма</p>
                <p id="total-price" class="text-4xl font-black italic">0 ₽</p>
            </div>
            
            <button onclick="finishOrder()" class="w-full bg-black text-white py-6 rounded-full font-black uppercase text-xs tracking-widest active:scale-95">Оформить заказ</button>
        </div>
    </div>

    <script>
        let cart = [];

        function addToCart(name, price) {
            cart.push({name, price});
            renderCart();
            openCart();
        }

        function renderCart() {
            const list = document.getElementById('cart-list');
            list.innerHTML = cart.map(i => `<div class="flex justify-between items-center p-5 bg-zinc-50 rounded-[25px] font-bold text-sm"><span>${i.name}</span><span>${i.price} ₽</span></div>`).join('');
            const total = cart.reduce((s, i) => s + i.price, 0);
            document.getElementById('total-price').innerText = total + ' ₽';
        }

        function openCart() { document.getElementById('modal-cart').classList.add('active'); }
        function openProfile() { document.getElementById('modal-profile').classList.add('active'); }
        function closeModals() {
            document.getElementById('modal-cart').classList.remove('active');
            document.getElementById('modal-profile').classList.remove('active');
        }

        function finishOrder() {
            const addr = document.getElementById('addr-input').value;
            if (addr.length < 5) {
                document.getElementById('addr-input').classList.add('error-shake');
                setTimeout(() => document.getElementById('addr-input').classList.remove('error-shake'), 400);
                return alert('Пожалуйста, введите точный адрес в Реттиховке!');
            }
            alert('Заказ принят! Богдан уже проверяет маршрут по Реттиховке.');
        }

        function setTheme(t) {
            if(t === 'dark') { document.body.style.backgroundColor = '#1c1c1e'; document.body.style.color = '#fff'; }
            else if(t === 'black') { document.body.style.backgroundColor = '#000'; document.body.style.color = '#fff'; }
            else if(t === 'orange') { document.body.style.backgroundColor = '#ff9500'; document.body.style.color = '#fff'; }
            else { document.body.style.backgroundColor = '#fff'; document.body.style.color = '#000'; }
            closeModals();
        }
    </script>
</body>
</html>

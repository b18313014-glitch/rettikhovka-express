<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RX HUB - РЕТТИХОВКА</title>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --blue: #007bff; --bg: #f4f7f6; --green: #2ed573; --yellow: #ffc107; }
        body { font-family: 'Montserrat', sans-serif; margin: 0; background: var(--bg); color: #333; }
        .page { position: fixed; inset: 0; display: none; flex-direction: column; background: var(--bg); }
        .page.active { display: flex; }
        
        /* ВИДЖЕТ КУРЬЕРА */
        .courier-widget { background: white; margin: 10px; padding: 15px; border-radius: 20px; display: flex; align-items: center; gap: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border-left: 5px solid var(--green); }
        
        header { display: flex; justify-content: space-between; padding: 15px 20px; background: white; align-items: center; }
        .container { padding: 20px; overflow-y: auto; flex: 1; }

        /* ПРИВЕТСТВИЕ */
        .welcome-card { background: var(--blue); color: white; padding: 20px; border-radius: 25px; margin-bottom: 20px; }
        .welcome-card h2 { margin: 0; font-weight: 900; }
        .welcome-card p { font-size: 13px; opacity: 0.9; margin: 10px 0 0 0; line-height: 1.4; }

        .main-nav { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .nav-btn { background: white; color: #333; border: none; padding: 20px 10px; border-radius: 15px; font-weight: 900; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }

        .go-btn { background: var(--blue); color: white; border: none; padding: 18px; border-radius: 15px; width: 100%; font-weight: 900; cursor: pointer; }
    </style>
</head>
<body>

    <div id="auth-page" class="page active" style="justify-content: center; align-items: center;">
        <div style="text-align: center; width: 85%;">
            <h1 style="font-weight: 900; color: var(--blue); font-size: 40px; margin: 0;">RX HUB</h1>
            <p style="margin-bottom: 30px; font-weight: bold;">Реттиховка на связи</p>
            <button class="go-btn" onclick="loginGoogle()" style="background: white; color: #333; border: 2px solid #eee; display: flex; align-items: center; justify-content: center; gap: 10px;">
                <img src="https://cdn-icons-png.flaticon.com/512/2991/2991148.png" width="20"> Войти через Google
            </button>
        </div>
    </div>

    <div id="home-page" class="page">
        <header>
            <div style="font-weight: 900; font-size: 20px;">RX HUB</div>
            <i class="fa-solid fa-circle-user" style="font-size: 30px; color: var(--blue);" onclick="openPage('profile-page')"></i>
        </header>

        <div class="container">
            <div class="welcome-card">
                <h2 id="user-name">Привет!</h2>
                <p>Добро пожаловать в RX HUB! Мы доставляем еду из магазинов, забираем ваши заказы с OZON и помогаем с перевозками по Реттиховке.</p>
            </div>

            <div class="courier-widget">
                <i class="fa-solid fa-person-biking" style="font-size: 24px; color: var(--green);"></i>
                <div>
                    <div style="font-size: 11px; color: #888;">Статус доставки:</div>
                    <div style="font-weight: 900;" id="status-text">Курьер Богдан готов к работе</div>
                </div>
            </div>

            <div class="main-nav" style="margin-top: 20px;">
                <button class="nav-btn" style="border-bottom: 4px solid var(--yellow);" onclick="openShop()">
                    <i class="fa-solid fa-burger"></i><br>ЕДА
                </button>
                <button class="nav-btn" style="border-bottom: 4px solid var(--blue);" onclick="openOzon()">
                    <i class="fa-solid fa-box-open"></i><br>OZON
                </button>
            </div>

            <h3 style="font-weight: 900; margin-top: 30px;">Популярное сегодня</h3>
            <div id="quick-products" style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                </div>
        </div>

        <div style="padding: 15px; background: white;">
            <button class="go-btn" onclick="openCart()"><i class="fa-solid fa-cart-shopping"></i> КОРЗИНА</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBD8BzKaEBxcD-e24ypRh1qZ-iCvZZY6nQ",
            authDomain: "deliverygov11.firebaseapp.com",
            projectId: "deliverygov11",
            storageBucket: "deliverygov11.firebasestorage.app",
            messagingSenderId: "562994407235",
            appId: "1:562994407235:web:27765b2d4916e82ec871f6"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        function openPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        // Вход через Google
        function loginGoogle() {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider).catch(err => alert("Ошибка: " + err.message));
        }

        // ПРОВЕРКА ПОЛЬЗОВАТЕЛЯ (СИСТЕМА ПОМНИТ ЕГО)
        auth.onAuthStateChanged(user => {
            if (user) {
                // Если зашел — сразу на главную
                openPage('home-page');
                document.getElementById('user-name').innerText = `Привет, ${user.displayName.split(' ')[0]}!`;
            } else {
                // Если нет — на экран входа
                openPage('auth-page');
            }
        });

        // Заглушки для функций (чтобы не было ошибок)
        function openShop() { alert("Открываем магазин..."); }
        function openOzon() { alert("Открываем окно OZON..."); }
        function openCart() { alert("Переход в корзину..."); }
    </script>
</body>
</html>

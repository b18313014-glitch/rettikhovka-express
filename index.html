<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RX-Express | Приложение</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.1.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.0/firebase-firestore-compat.js"></script>

    <style>
        :root { --blue: #007bff; --bg: #f4f7f9; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        
        .app-container { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 90%; max-width: 400px; text-align: center; }
        
        /* Скрываем все секции по умолчанию */
        .section { display: none; flex-direction: column; gap: 15px; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .btn { border: none; padding: 14px; border-radius: 12px; cursor: pointer; font-size: 16px; font-weight: 600; transition: 0.3s; width: 100%; }
        .btn-google { background: #4285F4; color: white; }
        .btn-main { background: var(--blue); color: white; }
        
        input { padding: 12px; border: 1px solid #ddd; border-radius: 10px; font-size: 16px; outline: none; }
        .loader-spinner { border: 4px solid #f3f3f3; border-top: 4px solid var(--blue); border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 10px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="app-container">
    
    <div id="sec-loader" class="section" style="display: flex;">
        <div class="loader-spinner"></div>
        <p>Загрузка системы...</p>
    </div>

    <div id="sec-auth" class="section">
        <h1>RX-Express</h1>
        <p>Добро пожаловать в доставку пос. Реттиховка</p>
        <button class="btn btn-google" onclick="login()">Войти через Google</button>
    </div>

    <div id="sec-phone" class="section">
        <h3>Нужен номер</h3>
        <p>Введите номер телефона для завершения:</p>
        <input type="tel" id="user-phone" placeholder="+7 (___) ___-__-__">
        <button class="btn btn-main" onclick="saveUserData()">Завершить</button>
    </div>

    <div id="sec-main" class="section">
        <h2 id="welcome-user">Привет!</h2>
        <div style="background: #e9ecef; padding: 20px; border-radius: 15px; border: 2px dashed #adb5bd;">
            Здесь будет твой основной интерфейс заказов
        </div>
        <button class="btn" style="background: #dc3545; color: white; margin-top: 20px;" onclick="logout()">Выйти</button>
    </div>

</div>

<script>
    // Твой актуальный конфиг
    const firebaseConfig = {
        apiKey: "AIzaSyBD8BzKaEBxcD-e24ypRh1qZ-iCvZZY6nQ",
        authDomain: "deliverygov11.firebaseapp.com",
        projectId: "deliverygov11",
        storageBucket: "deliverygov11.firebasestorage.app",
        messagingSenderId: "562994407235",
        appId: "1:562994407235:web:27765b2d4916e82ec871f6"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    // Функция переключения экранов
    function showSection(id) {
        document.querySelectorAll('.section').forEach(s => s.style.display = 'none');
        document.getElementById(id).style.display = 'flex';
    }

    // ЛОГИКА ПРОВЕРКИ
    auth.onAuthStateChanged(async (user) => {
        if (user) {
            const userDoc = await db.collection('users').doc(user.uid).get();
            
            if (userDoc.exists && userDoc.data().phone) {
                // Если всё есть — открываем главный экран
                document.getElementById('welcome-user').innerText = `Привет, ${user.displayName}!`;
                showSection('sec-main');
            } else {
                // Если нет телефона — на регистрацию
                showSection('sec-phone');
            }
        } else {
            // Если не вошел — на экран входа
            showSection('sec-auth');
        }
    });

    async function login() {
        const provider = new firebase.auth.GoogleAuthProvider();
        await auth.signInWithPopup(provider).catch(e => alert(e.message));
    }

    async function saveUserData() {
        const phone = document.getElementById('user-phone').value;
        if (phone.length < 10) return alert("Введите номер!");

        const user = auth.currentUser;
        await db.collection('users').doc(user.uid).set({
            name: user.displayName,
            email: user.email,
            phone: phone,
            uid: user.uid
        }, { merge: true });
        
        // После сохранения Firestore сам обновит состояние через onAuthStateChanged
    }

    function logout() {
        auth.signOut();
    }
</script>

</body>
</html>

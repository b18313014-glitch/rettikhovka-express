<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RX Delivery — Вход</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #ffffff; height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; overflow: hidden; }
        
        /* Тот самый Liquid Glass: очень маленький и центрированный */
        .glass-box { 
            background: rgba(255, 255, 255, 0.8); 
            backdrop-filter: blur(20px); 
            border: 1px solid rgba(0,0,0,0.05); 
            width: 280px; /* Еще компактнее */
            padding: 20px;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
        }

        .input-rx { 
            background: #f4f4f4; border: none; font-size: 11px; font-weight: 700; 
            width: 100%; padding: 12px; border-radius: 12px; margin-bottom: 8px;
        }
        .input-rx:focus { outline: none; background: #eee; }

        .btn-black { 
            background: #000; color: #fff; font-size: 9px; font-weight: 900; 
            text-transform: uppercase; letter-spacing: 1px; padding: 12px; 
            border-radius: 12px; width: 100%; transition: 0.2s; 
        }
        .btn-black:active { transform: scale(0.97); }

        .social-row { display: flex; gap: 8px; margin-top: 10px; }
        .social-btn { 
            border: 1px solid rgba(0,0,0,0.05); padding: 8px; border-radius: 10px; 
            flex: 1; display: flex; justify-content: center; align-items: center;
        }
        .social-btn img { width: 14px; height: 14px; }

        .hidden { display: none !important; }
        .slide { animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="flex flex-col items-center slide">
        <div class="text-center mb-5">
            <h1 class="text-3xl font-black italic uppercase tracking-tighter">RX</h1>
            <p class="text-[7px] font-black opacity-20 uppercase tracking-[0.3em]">Core Access</p>
        </div>

        <div class="glass-box">
            <div id="auth-fields">
                <input id="email" type="email" placeholder="Почта" class="input-rx">
                <div class="relative">
                    <input id="password" type="password" placeholder="Пароль" class="input-rx">
                    <button onclick="resetPass()" class="absolute right-3 top-3 text-[7px] font-black opacity-20 hover:opacity-100 uppercase">Забыл?</button>
                </div>
                <button onclick="loginEmail()" class="btn-black">Войти</button>
            </div>

            <div id="phone-fields" class="hidden mt-2 pt-2 border-t border-black/5 slide">
                <p class="text-[7px] font-black opacity-30 uppercase text-center mb-3 tracking-widest">Нужно подтверждение</p>
                <div id="recaptcha-container"></div>
                <input id="phone-number" type="tel" placeholder="+7 900 000 00 00" class="input-rx text-center">
                
                <div id="sms-area" class="hidden">
                    <input id="sms-code" type="number" placeholder="Код" class="input-rx text-center tracking-[0.5em] text-sm">
                    <button onclick="confirmSms()" class="btn-black bg-orange-500">Подтвердить</button>
                </div>
                
                <button id="btn-send" onclick="sendSms()" class="btn-black">Получить код</button>
            </div>

            <div id="social-area">
                <div class="flex items-center gap-2 my-3">
                    <div class="h-[1px] bg-black/5 flex-grow"></div>
                    <span class="text-[6px] font-black opacity-10 uppercase">или</span>
                    <div class="h-[1px] bg-black/5 flex-grow"></div>
                </div>

                <div class="social-row">
                    <button onclick="loginGoogle()" class="social-btn"><img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg"></button>
                    <button onclick="loginApple()" class="social-btn"><img src="https://upload.wikimedia.org/wikipedia/commons/f/fa/Apple_logo_black.svg"></button>
                </div>
                
                <button onclick="regEmail()" class="text-[7px] font-black opacity-10 uppercase tracking-widest block w-full mt-4 hover:opacity-40 transition-all">Создать аккаунт</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBD8BzKaEBxcD-e24ypRh1qZ-iCvZZY6nQ",
            authDomain: "deliverygov11.firebaseapp.com",
            projectId: "deliverygov11",
            storageBucket: "deliverygov11.firebasestorage.app",
            messagingSenderId: "562994407235",
            appId: "1:562994407235:web:dde4e7438511fa1bc871f6"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let verId;
        window.recaptchaVerifier = new firebase.auth.RecaptchaVerifier('recaptcha-container', { 'size': 'invisible' });

        auth.onAuthStateChanged(async (user) => {
            if (user) {
                const doc = await db.collection("users").doc(user.uid).get();
                const data = doc.data();

                if (data && data.isBlocked) { window.location.href = "support.html"; return; }

                // Если зашел, но телефон не привязан — показываем только поле телефона
                if (!data || !data.phoneVerified) {
                    document.getElementById('auth-fields').classList.add('hidden');
                    document.getElementById('phone-fields').classList.remove('hidden');
                } else {
                    alert("Доступ разрешен!"); // Тут твой переход в приложение
                }
            }
        });

        function loginGoogle() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
        function loginApple() { auth.signInWithPopup(new firebase.auth.OAuthProvider('apple.com')); }
        
        function loginEmail() {
            const e = document.getElementById('email').value;
            const p = document.getElementById('password').value;
            auth.signInWithEmailAndPassword(e, p).catch(err => alert(err.message));
        }

        function regEmail() {
            const e = document.getElementById('email').value;
            const p = document.getElementById('password').value;
            auth.createUserWithEmailAndPassword(e, p).catch(err => alert(err.message));
        }

        function sendSms() {
            const phone = document.getElementById('phone-number').value;
            auth.signInWithPhoneNumber(phone, window.recaptchaVerifier).then(res => {
                verId = res;
                document.getElementById('btn-send').classList.add('hidden');
                document.getElementById('sms-area').classList.remove('hidden');
            }).catch(err => alert(err.message));
        }

        function confirmSms() {
            const code = document.getElementById('sms-code').value;
            verId.confirm(code).then(async () => {
                await db.collection("users").doc(auth.currentUser.uid).set({
                    phoneVerified: true, phone: document.getElementById('phone-number').value,
                    rank: 1, rating: 5, isBlocked: false
                }, { merge: true });
                location.reload();
            }).catch(() => alert("Код неверный!"));
        }

        function resetPass() {
            const e = document.getElementById('email').value;
            if(!e) return alert("Введи почту!");
            auth.sendPasswordResetEmail(e).then(() => alert("Проверь почту!")).catch(err => alert(err.message));
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RX Delivery — Вход</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #ffffff; height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; overflow: hidden; }
        
        /* Жестко фиксируем размер контейнера, чтобы не плыл на планшете */
        .auth-card { 
            background: rgba(255, 255, 255, 0.9); 
            backdrop-filter: blur(20px); 
            border: 1px solid rgba(0,0,0,0.05); 
            width: 280px; 
            padding: 20px;
            border-radius: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.03);
            text-align: center;
        }

        .rx-input { 
            background: #f2f2f2; border: none; font-size: 11px; font-weight: 700; 
            width: 100%; padding: 12px; border-radius: 12px; margin-bottom: 6px;
        }
        .rx-input:focus { outline: none; background: #ebebeb; }

        .rx-btn { 
            background: #000; color: #fff; font-size: 9px; font-weight: 900; 
            text-transform: uppercase; letter-spacing: 1px; padding: 12px; 
            border-radius: 12px; width: 100%; transition: 0.2s; margin-top: 4px;
        }
        .rx-btn:active { transform: scale(0.97); }

        .social-icon { width: 14px; height: 14px; }
        .social-grid { display: flex; gap: 8px; margin-top: 10px; }
        .social-box { border: 1px solid rgba(0,0,0,0.05); padding: 8px; border-radius: 10px; flex: 1; display: flex; justify-content: center; }

        .hidden { display: none !important; }
        .fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="auth-card fade-in">
        <div class="mb-5">
            <h1 class="text-3xl font-black italic uppercase tracking-tighter">RX</h1>
            <p class="text-[7px] font-black opacity-20 uppercase tracking-[0.3em]">Secure Access</p>
        </div>

        <div id="login-form">
            <input id="email" type="email" placeholder="Почта" class="rx-input">
            <div class="relative">
                <input id="password" type="password" placeholder="Пароль" class="rx-input">
                <button onclick="sendReset()" class="absolute right-3 top-3 text-[7px] font-black opacity-20 hover:opacity-100 uppercase">Забыл?</button>
            </div>
            
            <div id="phone-section" class="hidden border-t border-black/5 mt-2 pt-3 fade-in">
                <p class="text-[7px] font-black opacity-30 uppercase mb-2 tracking-widest text-center">Подтверждение номера</p>
                <div id="recaptcha-container"></div>
                <input id="phone-number" type="tel" placeholder="+7 900 000 00 00" class="rx-input text-center">
                
                <div id="sms-section" class="hidden">
                    <input id="sms-code" type="number" placeholder="Код из SMS" class="rx-input text-center tracking-[0.4em]">
                    <button onclick="confirmCode()" class="rx-btn bg-orange-500">Подтвердить</button>
                </div>
                
                <button id="btn-send-sms" onclick="handleSms()" class="rx-btn">Получить код</button>
            </div>

            <button id="btn-login" onclick="doLogin()" class="rx-btn">Войти</button>

            <div id="social-section">
                <div class="flex items-center gap-2 my-3">
                    <div class="h-[1px] bg-black/5 flex-grow"></div>
                    <span class="text-[6px] font-black opacity-10 uppercase">или</span>
                    <div class="h-[1px] bg-black/5 flex-grow"></div>
                </div>
                <div class="social-grid">
                    <button onclick="auth.signInWithPopup(new firebase.auth.GoogleAuthProvider())" class="social-box">
                        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="social-icon">
                    </button>
                    <button onclick="auth.signInWithPopup(new firebase.auth.OAuthProvider('apple.com'))" class="social-box">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/f/fa/Apple_logo_black.svg" class="social-icon">
                    </button>
                </div>
                <button onclick="doRegister()" class="text-[7px] font-black opacity-10 uppercase tracking-widest block w-full mt-4 hover:opacity-50">Регистрация</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBD8BzKaEBxcD-e24ypRh1qZ-iCvZZY6nQ",
            authDomain: "deliverygov11.firebaseapp.com",
            projectId: "deliverygov11",
            storageBucket: "deliverygov11.firebasestorage.app",
            messagingSenderId: "562994407235",
            appId: "1:562994407235:web:dde4e7438511fa1bc871f6"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let verificationResult;
        window.recaptchaVerifier = new firebase.auth.RecaptchaVerifier('recaptcha-container', { 'size': 'invisible' });

        auth.onAuthStateChanged(async (user) => {
            if (user) {
                const doc = await db.collection("users").doc(user.uid).get();
                const data = doc.data();

                if (data && data.isBlocked) { window.location.href = "support.html"; return; }

                // Если номер еще не подтвержден — показываем секцию телефона
                if (!data || !data.phoneVerified) {
                    document.getElementById('btn-login').classList.add('hidden');
                    document.getElementById('social-section').classList.add('hidden');
                    document.getElementById('phone-section').classList.remove('hidden');
                } else {
                    alert("Вход разрешен!"); 
                }
            }
        });

        function doLogin() {
            const e = document.getElementById('email').value;
            const p = document.getElementById('password').value;
            auth.signInWithEmailAndPassword(e, p).catch(err => alert(err.message));
        }

        function doRegister() {
            const e = document.getElementById('email').value;
            const p = document.getElementById('password').value;
            auth.createUserWithEmailAndPassword(e, p).catch(err => alert(err.message));
        }

        function handleSms() {
            const phone = document.getElementById('phone-number').value;
            auth.signInWithPhoneNumber(phone, window.recaptchaVerifier).then(res => {
                verificationResult = res;
                document.getElementById('btn-send-sms').classList.add('hidden');
                document.getElementById('sms-section').classList.remove('hidden');
            }).catch(err => alert(err.message));
        }

        function confirmCode() {
            const code = document.getElementById('sms-code').value;
            verificationResult.confirm(code).then(async () => {
                await db.collection("users").doc(auth.currentUser.uid).set({
                    phoneVerified: true, phone: document.getElementById('phone-number').value,
                    rank: 1, rating: 5, isBlocked: false
                }, { merge: true });
                location.reload();
            }).catch(() => alert("Ошибка кода!"));
        }

        function sendReset() {
            const e = document.getElementById('email').value;
            if(!e) return alert("Введите почту!");
            auth.sendPasswordResetEmail(e).then(() => alert("Проверьте почту!")).catch(err => alert(err.message));
        }
    </script>
</body>
</html>

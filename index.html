<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RX SYSTEM | Реттиховка</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --border: 3px solid #000; }
        * { box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: #fff; color: #000; margin: 0; }

        /* Экраны */
        .screen { display: none; min-height: 100vh; flex-direction: column; align-items: center; padding: 20px; }
        .active { display: flex; }

        /* Дизайн корзины */
        .cart-item {
            width: 100%; max-width: 500px;
            border: var(--border); padding: 15px; margin-bottom: 15px;
            display: flex; align-items: center; gap: 15px;
        }
        .item-img { width: 80px; height: 80px; background: #eee; border: 2px solid #000; }
        .controls { display: flex; align-items: center; gap: 15px; margin-top: 10px; }
        .btn-qty { background: #000; color: #fff; border: none; width: 30px; height: 30px; cursor: pointer; }

        /* Окно согласия (Оставить у двери) */
        #leave-door-box {
            background: #f0f0f0; border: var(--border);
            padding: 20px; margin-top: 20px; display: none;
            max-width: 500px; text-align: left;
        }

        /* Статус-бар рейтинга */
        .status-bar {
            width: 100%; padding: 10px; background: #000; color: #fff;
            position: sticky; top: 0; display: flex; justify-content: space-around;
        }

        .btn-pay { background: #000; color: #fff; padding: 20px; width: 100%; font-weight: 900; border: none; margin-top: 20px; cursor: pointer; }
        .disabled { opacity: 0.3; pointer-events: none; }
    </style>
</head>
<body>

    <div id="status" class="status-bar">
        <span>УРОВЕНЬ: <b id="lvl-val">1</b></span>
        <span>РЕЙТИНГ: <b id="rate-val">5</b></span>
    </div>

    <section id="cart-screen" class="screen active">
        <h2 style="text-transform: uppercase;">Ваш заказ</h2>
        
        <div class="cart-item">
            <div class="item-img"><img src="" alt="" id="prod-img"></div>
            <div style="flex-grow: 1;">
                <b id="prod-name">Кириешки (пачка)</b><br>
                <span>Цена: 35₽</span>
                <div class="controls">
                    <button class="btn-qty" onclick="changeQty(-1)">-</button>
                    <b id="qty">1</b>
                    <button class="btn-qty" onclick="changeQty(1)">+</button>
                </div>
            </div>
        </div>

        <div id="weight-warning" style="color: red; display: none; font-weight: bold; margin-bottom: 10px;">
            ⚠️ ОШИБКА: Вес более 20кг! Мы не сможем это довезти.
        </div>

        <div style="margin: 20px 0;">
            <input type="checkbox" id="at-door" onchange="toggleDoorWarning()"> 
            <label for="at-door">Оставить у двери</label>
        </div>

        <div id="leave-door-box">
            <i class="fa-solid fa-circle-exclamation"></i>
            <b>СОГЛАШЕНИЕ:</b> Если товар украдут или вы его не найдете — мы не несем ответственности. Все претензии к вам.
            <br><br>
            <input type="checkbox" id="agree-check" onchange="checkLock()"> Я согласен
        </div>

        <button id="pay-btn" class="btn-pay" onclick="order()">ОФОРМИТЬ ЗАКАЗ</button>
    </section>

    <script>
        let qty = 1;
        let rating = 10; // Допустим, у тебя рейтинг 10
        let level = rating >= 10 ? 2 : 1;

        document.getElementById('lvl-val').innerText = level;
        document.getElementById('rate-val').innerText = rating;

        function changeQty(amt) {
            qty += amt;
            if (qty < 1) qty = 1;
            document.getElementById('qty').innerText = qty;
            
            // Проверка на 20кг (допустим пачка 100г)
            if (qty > 200) {
                document.getElementById('weight-warning').style.display = 'block';
                document.getElementById('pay-btn').classList.add('disabled');
            } else {
                document.getElementById('weight-warning').style.display = 'none';
                document.getElementById('pay-btn').classList.remove('disabled');
            }
        }

        function toggleDoorWarning() {
            const box = document.getElementById('leave-door-box');
            box.style.display = document.getElementById('at-door').checked ? 'block' : 'none';
            checkLock();
        }

        function checkLock() {
            const needsAgree = document.getElementById('at-door').checked;
            const hasAgreed = document.getElementById('agree-check').checked;
            const btn = document.getElementById('pay-btn');

            if (needsAgree && !hasAgreed) {
                btn.classList.add('disabled');
            } else {
                btn.classList.remove('disabled');
            }
        }

        function order() {
            alert("Заказ принят! Если сумма большая — оплатите по QR-коду СБП.");
        }
    </script>
</body>
</html>

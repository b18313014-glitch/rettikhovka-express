<script type="module">
    // Настройки для Google (для входа через Google)
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBD8BzKaEBxcD-e24ypRh1qZ-iCvZZY6nQ",
        authDomain: "deliverygov11.firebaseapp.com",
        projectId: "deliverygov11",
        appId: "1:562994407235:web:27765b2d4916e82ec871f6"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    let targetCode = ""; // Переменная для хранения отправленного кода

    // Переключение страниц
    window.openPage = (id) => {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    };

    // Автопереход между ячейками кода
    window.step = (curr, next) => { if(curr.value.length >= 1) document.getElementById(next).focus(); };

    // 1. ОТПРАВКА SMS ЧЕРЕЗ SMS.RU
    window.sendSmsRu = () => {
        const phoneInput = document.getElementById('user-phone').value;
        if(!phoneInput) return alert("Введите номер!");

        // Исправляем номер (8 на 7)
        let cleanPhone = phoneInput.replace(/\D/g, '');
        if (cleanPhone.startsWith('8')) cleanPhone = '7' + cleanPhone.slice(1);
        
        const api_id = "BF89352B-A09E-FEA7-5E8D-6038D5FB0019"; // Твой ключ
        const code = Math.floor(100000 + Math.random() * 900000); 
        targetCode = code.toString();

        fetch(`https://sms.ru/sms/send?api_id=${api_id}&to=${cleanPhone}&msg=Код+RX+HUB:+${code}&json=1`)
        .then(r => r.json())
        .then(data => {
            if(data.status == "OK") {
                document.getElementById('verify-info').innerText = "Код отправлен на " + cleanPhone;
                openPage('code-screen');
            } else {
                alert("Ошибка SMS.RU: " + data.status_text);
            }
        }).catch(e => alert("Ошибка сети: " + e.message));
    };

    // 2. ВЕРСИЯ ДЛЯ ПОЧТЫ (РЕАЛЬНАЯ ПРОВЕРКА ЦВЕТОМ)
    window.sendEmailReal = () => {
        const email = document.getElementById('user-email').value;
        if(!email) return alert("Введите почту!");
        
        targetCode = "123321"; // Тестовый код для твоей почты
        document.getElementById('verify-info').innerText = "Код отправлен на " + email + " (Тест: 123321)";
        openPage('code-screen');
    };

    // 3. ПРОВЕРКА КОДА (КРАСНЫЙ / ЗЕЛЕНЫЙ)
    window.checkFinal = () => {
        const inputs = Array.from(document.querySelectorAll('.code-input'));
        const enteredCode = inputs.map(i => i.value).join('');
        
        if(enteredCode.length < 6) return;

        if(enteredCode === targetCode) {
            // УСПЕХ: Все поля становятся зелеными
            inputs.forEach(i => {
                i.style.borderColor = "var(--green)";
                i.style.color = "var(--green)";
                i.style.background = "#e8f5e9";
            });
            setTimeout(() => {
                document.getElementById('display-name').innerText = "Пользователь RX";
                openPage('main-hub');
            }, 800);
        } else {
            // ОШИБКА: Поля краснеют и очищаются
            inputs.forEach(i => {
                i.style.borderColor = "var(--red)";
                i.style.color = "var(--red)";
                i.classList.add('error'); // Тряска из CSS
                
                setTimeout(() => {
                    i.classList.remove('error');
                    i.style.borderColor = "#ddd";
                    i.style.color = "#000";
                    i.style.background = "#fff";
                    i.value = '';
                }, 1000);
            });
            document.getElementById('c1').focus();
        }
    };

    window.loginGoogle = () => {
        signInWithPopup(auth, provider).then(res => {
            document.getElementById('display-name').innerText = res.user.displayName;
            openPage('main-hub');
        });
    };
</script>

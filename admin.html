<script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>

<div id="items-sec" style="display:none">
    <h3>Управление товарами</h3>
    
    <div class="card">
        <button class="btn" onclick="startScanner()" style="background: #6c5ce7; margin-bottom: 15px;">
            <i class="fa-solid fa-barcode"></i> ОТКРЫТЬ СКАНЕР
        </button>
        <div id="scanner-container" style="width: 100%; display:none; margin-bottom: 10px; border-radius: 15px; overflow: hidden;"></div>
        
        <input type="text" id="p-barcode" placeholder="Штрих-код (сам появится после скана)">
        <input type="text" id="p-name" placeholder="Название товара">
        <input type="number" id="p-price" placeholder="Цена (₽)">
        
        <label style="font-size: 12px; color: #888;">Выберите магазин:</label>
        <select id="p-shop-select" style="background:#222; color:white; padding:10px; width:100%; border-radius:5px; margin-top:5px;"></select>
        
        <button class="btn" style="margin-top: 20px;" onclick="saveProduct()">СОХРАНИТЬ ТОВАР</button>
    </div>
    
    <div id="list-items">
        </div>
</div>

<script>
// ЗАГРУЗКА МАГАЗИНОВ В СПИСОК
function loadShopsToSelect() {
    db.collection('shops').onSnapshot(snap => {
        const select = document.getElementById('p-shop-select');
        select.innerHTML = '';
        snap.forEach(doc => {
            select.innerHTML += `<option value="${doc.id}">${doc.data().name}</option>`;
        });
    });
}

// ЛОГИКА СКАНЕРА
function startScanner() {
    document.getElementById('scanner-container').style.display = 'block';
    Quagga.init({
        inputStream: { name: "Live", type: "LiveStream", target: document.querySelector('#scanner-container') },
        decoder: { readers: ["ean_reader", "ean_8_reader", "code_128_reader"] }
    }, function(err) {
        if (err) { console.log(err); return; }
        Quagga.start();
    });

    Quagga.onDetected(function(data) {
        const code = data.codeResult.code;
        document.getElementById('p-barcode').value = code;
        
        // Поиск товара в базе по штрих-коду
        db.collection('products').where('barcode', '==', code).get().then(snap => {
            if(!snap.empty) {
                const p = snap.docs[0].data();
                document.getElementById('p-name').value = p.name;
                document.getElementById('p-price').value = p.price;
            }
        });
        
        Quagga.stop();
        document.getElementById('scanner-container').style.display = 'none';
    });
}

// СОХРАНЕНИЕ
function saveProduct() {
    const barcode = document.getElementById('p-barcode').value;
    const name = document.getElementById('p-name').value;
    const price = Number(document.getElementById('p-price').value);
    const shopId = document.getElementById('p-shop-select').value;
    const shopName = document.getElementById('p-shop-select').options[document.getElementById('p-shop-select').selectedIndex].text;

    db.collection('products').add({
        barcode, name, price, shopId, shopName, date: new Date()
    }).then(() => {
        alert("Товар для магазина " + shopName + " добавлен!");
        document.getElementById('p-barcode').value = '';
        document.getElementById('p-name').value = '';
        document.getElementById('p-price').value = '';
    });
}

loadShopsToSelect();
</script>

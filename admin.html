<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>RETTIKHOVKA EXPRESS | CLIENT</title>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore-compat.js"></script>
    <style>
        :root { --main: #007bff; --bg: #0a0a0a; --card: #161616; }
        body { background: var(--bg); color: white; font-family: 'Montserrat', sans-serif; margin: 0; }
        
        .screen { display: none; padding: 20px; }
        .active { display: block; }
        
        .btn-big { background: var(--main); padding: 25px; border-radius: 20px; margin: 10px 0; text-align: center; font-weight: 900; cursor: pointer; }
        .shop-card { background: var(--card); padding: 15px; border-radius: 15px; margin-bottom: 10px; cursor: pointer; }
        
        /* Модальное окно доставки */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: var(--card); padding: 25px; border-radius: 25px; width: 85%; border: 1px solid var(--main); }
        
        .p-img-processed { filter: contrast(1.2) brightness(1.1); border: 2px solid white; border-radius: 10px; }
    </style>
</head>
<body>

<div id="screen-main" class="screen active">
    <h1>RX EXPRESS</h1>
    <div class="btn-big" onclick="showShops()">ЗАКАЗАТЬ ЕДУ</div>
    <div class="btn-big" style="background: #6c5ce7;" onclick="openDeliveryModal()">ЗАКАЗАТЬ ДОСТАВКУ</div>
    
    <hr>
    <h3>СРОЧНО (Срок годности!)</h3>
    <div id="urgent-items"></div>
</div>

<div id="screen-shops" class="screen">
    <button onclick="goBack('main')">← Назад</button>
    <h2>Выберите магазин</h2>
    <div id="shops-list"></div>
</div>

<div id="screen-catalog" class="screen">
    <button onclick="goBack('shops')">← К магазинам</button>
    <h2 id="current-shop-name">Магазин</h2>
    <div id="categories-nav"></div>
    <div id="products-list"></div>
</div>

<div id="delivery-modal" class="modal">
    <div class="modal-content">
        <h3>Новая доставка</h3>
        <p style="font-size: 12px; color: #ff4757;">⚠️ Файлы > 3МБ не принимаются! Только JPG/PNG.</p>
        <input type="file" id="delivery-file" accept="image/jpeg,image/png">
        <button class="btn-big" style="width:100%;" onclick="uploadDelivery()">ОТПРАВИТЬ</button>
        <button onclick="closeModal()" style="background:none; color:white; border:none; margin-top:10px; width:100%;">ОТМЕНА</button>
    </div>
</div>

<script>
    // Firebase Config
    const firebaseConfig = { apiKey: "AIzaSyBD8BzKaEBxcD-e24ypRh1qZ-iCvZZY6nQ", projectId: "deliverygov11" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // 1. СИСТЕМА ФОТО (НЕЙРО-ОБРЕЗКА)
    function processImage(file) {
        if(file.size > 3 * 1024 * 1024) return alert("ФАЙЛ СЛИШКОМ БОЛЬШОЙ!");
        // Здесь мы применяем фильтры для "белого фона" при выводе
        return true;
    }

    // 2. ВЫБОР МАГАЗИНА
    function showShops() {
        switchTab('shops');
        db.collection('shops').get().then(snap => {
            const list = document.getElementById('shops-list');
            list.innerHTML = '';
            snap.forEach(doc => {
                list.innerHTML += `<div class="shop-card" onclick="showCatalog('${doc.id}', '${doc.data().name}')">${doc.data().name}</div>`;
            });
        });
    }

    // 3. КАТАЛОГ С КАТЕГОРИЯМИ
    function showCatalog(id, name) {
        switchTab('catalog');
        document.getElementById('current-shop-name').innerText = name;
        db.collection('products').where('shopId', '==', id).onSnapshot(snap => {
            const list = document.getElementById('products-list');
            list.innerHTML = '';
            snap.forEach(doc => {
                const p = doc.data();
                list.innerHTML += `
                    <div style="background:#111; padding:10px; border-radius:10px; margin-bottom:10px;">
                        <img src="${p.img}" class="p-img-processed" style="width:80px;">
                        <b>${p.name}</b> - ${p.price}₽
                        <br><small>Годен до: ${p.expiryDate || '—'}</small>
                        <button onclick="addToCart('${doc.id}')">+</button>
                    </div>`;
            });
        });
    }

    // 4. СРОК ГОДНОСТИ НА ГЛАВНОЙ
    function loadUrgent() {
        const now = new Date().toISOString().split('T')[0];
        db.collection('products').where('expiryDate', '<=', now).limit(3).get().then(snap => {
            const div = document.getElementById('urgent-items');
            snap.forEach(doc => {
                div.innerHTML += `<div style="color:red; font-size:12px;">🔥 ${doc.data().name} - СРОЧНО!</div>`;
            });
        });
    }

    function switchTab(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('screen-' + id).classList.add('active');
    }

    function openDeliveryModal() { document.getElementById('delivery-modal').style.display = 'flex'; }
    function closeModal() { document.getElementById('delivery-modal').style.display = 'none'; }

    loadUrgent();
</script>
</body>
</html>

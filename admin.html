<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RX Admin — Пульт управления</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .order-card { @apply bg-white p-6 rounded-[30px] border border-zinc-100 shadow-sm mb-4 animate-in fade-in slide-in-from-bottom-4 duration-500; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="p-6">

    <div id="auth-section" class="flex flex-col items-center justify-center min-h-[80vh]">
        <div class="w-20 h-20 bg-orange-500 rounded-3xl mb-8 flex items-center justify-center text-4xl shadow-xl">🏠</div>
        <h1 class="text-3xl font-black italic mb-2">RX ADMIN</h1>
        <p class="text-xs opacity-40 font-bold uppercase tracking-widest mb-8">Реттиховка Экспресс</p>
        <button onclick="login()" class="bg-black text-white px-10 py-5 rounded-2xl font-black uppercase text-[10px] tracking-widest active:scale-95 transition-all">Войти как Владелец</button>
    </div>

    <div id="admin-panel" class="hidden">
        <header class="flex justify-between items-center mb-10">
            <div>
                <h2 class="text-3xl font-black italic tracking-tighter uppercase">Панель</h2>
                <p id="admin-status" class="text-[10px] font-black text-orange-500 uppercase tracking-widest">Администратор: Богдан</p>
            </div>
            <button onclick="logout()" class="text-[10px] font-black opacity-30 uppercase">Выйти</button>
        </header>

        <div class="grid grid-cols-2 gap-4 mb-10">
            <div class="bg-white p-6 rounded-[35px] border border-zinc-100">
                <p class="text-[10px] font-black opacity-30 uppercase mb-1">Всего заказов</p>
                <p id="stat-count" class="text-4xl font-black italic">0</p>
            </div>
            <div class="bg-white p-6 rounded-[35px] border border-zinc-100">
                <p class="text-[10px] font-black opacity-30 uppercase mb-1">Выручка</p>
                <p id="stat-money" class="text-4xl font-black italic text-green-600">0 ₽</p>
            </div>
        </div>

        <div>
            <h3 class="text-sm font-black italic uppercase mb-6 flex items-center gap-2">
                Активные заказы <span class="w-2 h-2 bg-red-500 rounded-full animate-pulse"></span>
            </h3>
            <div id="orders-container">
                <div class="py-20 text-center opacity-20 italic font-bold">Ожидание новых заказов из Реттиховки...</div>
            </div>
        </div>
    </div>

    <script>
        // --- ВСТАВЬ СВОЙ КОНФИГ НИЖЕ ---
        const firebaseConfig = {
            apiKey: "ТВОЙ_API_KEY",
            authDomain: "deliverygov11.firebaseapp.com",
            projectId: "deliverygov11",
            storageBucket: "deliverygov11.appspot.com",
            messagingSenderId: "ЧИСЛА",
            appId: "ЧИСЛА"
        };
        // -------------------------------

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const ADMIN_EMAIL = "b18313014@gmail.com";

        auth.onAuthStateChanged((user) => {
            if (user && user.email === ADMIN_EMAIL) {
                document.getElementById('auth-section').classList.add('hidden');
                document.getElementById('admin-panel').classList.remove('hidden');
                startListeningOrders();
            } else if (user) {
                alert("Доступ закрыт! Это панель только для Богдана.");
                auth.signOut();
            }
        });

        function login() {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider);
        }

        function logout() { auth.signOut(); location.reload(); }

        // СЛУШАЕМ БАЗУ ДАННЫХ В РЕАЛЬНОМ ВРЕМЕНИ
        function startListeningOrders() {
            db.collection("orders").orderBy("createdAt", "desc")
            .onSnapshot((snapshot) => {
                const container = document.getElementById('orders-container');
                const statCount = document.getElementById('stat-count');
                const statMoney = document.getElementById('stat-money');
                
                if (snapshot.empty) {
                    container.innerHTML = `<div class="py-20 text-center opacity-20 italic font-bold">Заказов пока нет</div>`;
                    return;
                }

                let html = "";
                let totalCash = 0;
                
                snapshot.forEach((doc) => {
                    const order = doc.data();
                    totalCash += order.price || 0;
                    
                    html += `
                        <div class="order-card">
                            <div class="flex justify-between items-start mb-4">
                                <span class="bg-zinc-100 px-3 py-1 rounded-full text-[10px] font-black uppercase">№ ${doc.id.slice(0,5)}</span>
                                <span class="text-green-600 font-black italic">${order.price} ₽</span>
                            </div>
                            <p class="font-black text-xl mb-1">${order.item}</p>
                            <p class="text-xs font-bold text-zinc-400 mb-4 uppercase tracking-tighter">📍 ${order.address}</p>
                            <div class="flex gap-2">
                                <button onclick="deleteOrder('${doc.id}')" class="flex-grow py-3 bg-zinc-100 rounded-xl text-[10px] font-black uppercase active:bg-red-50 text-red-500">Удалить</button>
                                <button onclick="alert('Курьер уведомлен!')" class="flex-grow py-3 bg-black text-white rounded-xl text-[10px] font-black uppercase">Выполнить</button>
                            </div>
                        </div>
                    `;
                });

                container.innerHTML = html;
                statCount.innerText = snapshot.size;
                statMoney.innerText = totalCash + " ₽";
            });
        }

        function deleteOrder(id) {
            if(confirm("Удалить заказ?")) {
                db.collection("orders").doc(id).delete();
            }
        }
    </script>
</body>
  </html>

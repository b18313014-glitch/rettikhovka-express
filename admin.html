<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RX-ULTIMATE | ADMIN</title>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { --main: #007bff; --red: #ff4757; --green: #2ecc71; --bg: #050505; }
        body { background: var(--bg); color: #fff; font-family: 'Montserrat', sans-serif; margin: 0; padding-bottom: 70px; }
        .tab { display: none; padding: 15px; }
        .active { display: block; }
        
        .card { background: #111; border: 1px solid #333; padding: 15px; border-radius: 15px; margin-bottom: 10px; }
        .btn { border: none; padding: 12px; border-radius: 10px; font-weight: 900; cursor: pointer; width: 100%; color: white; margin-top: 5px; }
        .btn-blue { background: var(--main); }
        .btn-red { background: var(--red); }
        
        input, select { width: 100%; padding: 12px; margin: 5px 0; background: #222; border: 1px solid #444; color: white; border-radius: 8px; }
        
        /* Навигация */
        .nav { position: fixed; bottom: 0; left: 0; right: 0; background: #111; display: flex; justify-content: space-around; padding: 10px; border-top: 2px solid var(--main); }
        .nav div { font-size: 10px; text-align: center; cursor: pointer; opacity: 0.5; }
        .nav .active-nav { opacity: 1; color: var(--main); }

        #preview-img { width: 100%; height: 200px; object-fit: contain; border-radius: 10px; display: none; filter: contrast(1.1) brightness(1.1); }
        #interactive.viewport { width: 100%; height: 180px; border-radius: 10px; overflow: hidden; border: 1px solid var(--main); }
        
        .user-row { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #222; }
    </style>
</head>
<body>

<div id="tab-scan" class="tab active">
    <h2>СУПЕР-СКАНЕР</h2>
    <div class="card">
        <div id="interactive" class="viewport"></div>
        <button class="btn btn-blue" onclick="startScan()">СКАНИРОВАТЬ (КРЫШКА/БОК)</button>
        <img id="preview-img" src="">
        <input type="file" id="cam" accept="image/*" capture="environment" style="display:none" onchange="processImage(this)">
        <button class="btn" style="background:var(--green)" onclick="document.getElementById('cam').click()">📸 ФОТО (НЕЙРО-ФИЛЬТР)</button>
        <input type="text" id="p-barcode" placeholder="Штрих-код">
        <input type="text" id="p-name" placeholder="Название">
        <input type="number" id="p-price" placeholder="Цена">
        <select id="p-shop"></select>
        <button class="btn btn-blue" id="save-btn" onclick="saveProduct()">СОХРАНИТЬ</button>
    </div>
</div>

<div id="tab-users" class="tab">
    <h2>ПОЛЬЗОВАТЕЛИ И КУРЬЕРЫ</h2>
    <div id="users-list" class="card">Загрузка...</div>
    <hr>
    <h3>КУРЬЕРЫ ОНЛАЙН</h3>
    <div id="courier-list" class="card"></div>
</div>

<div id="tab-items" class="tab">
    <h2>ВСЕ ТОВАРЫ</h2>
    <div id="items-list"></div>
</div>

<div class="nav">
    <div class="active-nav" onclick="switchTab('scan', this)">СКАНЕР</div>
    <div onclick="switchTab('users', this)">ЮЗЕРЫ</div>
    <div onclick="switchTab('items', this)">ТОВАРЫ</div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyBD8BzKaEBxcD-e24ypRh1qZ-iCvZZY6nQ", authDomain: "deliverygov11.firebaseapp.com", projectId: "deliverygov11" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    function switchTab(id, el) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.nav div').forEach(n => n.classList.remove('active-nav'));
        document.getElementById('tab-' + id).classList.add('active');
        el.classList.add('active-nav');
        if(id === 'users') loadUsers();
        if(id === 'items') loadItems();
    }

    // 1. СКАНЕР С ПРОВЕРКОЙ НА ДУБЛИКАТЫ
    function startScan() {
        Quagga.init({
            inputStream: { name: "Live", type: "LiveStream", target: document.querySelector('#interactive') },
            decoder: { readers: ["ean_reader", "code_128_reader", "code_39_reader"] }
        }, (err) => { Quagga.start(); });
        
        Quagga.onDetected(async (data) => {
            const code = data.codeResult.code;
            document.getElementById('p-barcode').value = code;
            Quagga.stop();

            // ПРОВЕРКА: Есть ли такой товар?
            const snap = await db.collection('products').where('barcode', '==', code).get();
            if(!snap.empty) {
                const existing = snap.docs[0].data();
                alert("ВНИМАНИЕ: Товар уже есть в базе! Подтягиваю данные...");
                document.getElementById('p-name').value = existing.name;
                document.getElementById('p-price').value = existing.price;
            } else {
                fetch(`https://world.openfoodfacts.org/api/v0/product/${code}.json`)
                .then(r => r.json()).then(d => { if(d.status === 1) document.getElementById('p-name').value = d.product.product_name; });
            }
        });
    }

    // 2. НЕЙРО-ФИЛЬТР ДЛЯ ФОТО
    function processImage(input) {
        const file = input.files[0];
        const reader = new FileReader();
        reader.onload = function(e) {
            const img = document.getElementById('preview-img');
            img.src = e.target.result;
            img.style.display = 'block';
            // Эмуляция обработки: повышаем контраст и чистим фон через CSS фильтр
            img.style.filter = "contrast(1.2) brightness(1.1) saturate(1.1)";
        };
        reader.readAsDataURL(file);
    }

    // 3. КОНТРОЛЬ ПОЛЬЗОВАТЕЛЕЙ
    function loadUsers() {
        db.collection('users').onSnapshot(snap => {
            const list = document.getElementById('users-list');
            list.innerHTML = '';
            snap.forEach(doc => {
                const u = doc.data();
                list.innerHTML += `<div class="user-row">
                    <span>${u.email || doc.id}</span>
                    <button class="btn btn-red" style="width:70px; font-size:10px;" onclick="deleteDoc('users', '${doc.id}')">БАН</button>
                </div>`;
            });
        });
        // Курьеры
        db.collection('couriers').onSnapshot(snap => {
            const list = document.getElementById('courier-list');
            list.innerHTML = '';
            snap.forEach(doc => {
                const c = doc.data();
                list.innerHTML += `<div class="card">🚚 ${c.name} - ${c.status || 'В ожидании'}</div>`;
            });
        });
    }

    // 4. СПИСОК И УДАЛЕНИЕ ТОВАРОВ
    function loadItems() {
        db.collection('products').onSnapshot(snap => {
            const list = document.getElementById('items-list');
            list.innerHTML = '';
            snap.forEach(doc => {
                const p = doc.data();
                list.innerHTML += `<div class="card" style="display:flex; justify-content:space-between; align-items:center;">
                    <div><b>${p.name}</b><br>${p.price}₽</div>
                    <button class="btn btn-red" style="width:100px;" onclick="deleteDoc('products', '${doc.id}')">УДАЛИТЬ</button>
                </div>`;
            });
        });
    }

    function deleteDoc(col, id) {
        if(confirm("Удалить это нафиг?")) db.collection(col).doc(id).delete();
    }

    db.collection('shops').onSnapshot(snap => {
        const s = document.getElementById('p-shop');
        s.innerHTML = '';
        snap.forEach(doc => s.innerHTML += `<option value="${doc.id}">${doc.data().name}</option>`);
    });

    function saveProduct() {
        const data = {
            barcode: document.getElementById('p-barcode').value,
            name: document.getElementById('p-name').value,
            price: Number(document.getElementById('p-price').value),
            shopId: document.getElementById('p-shop').value,
            img: document.getElementById('preview-img').src,
            date: new Date()
        };
        db.collection('products').add(data).then(() => alert("Сохранено!"));
    }
</script>
</body>
</html>
